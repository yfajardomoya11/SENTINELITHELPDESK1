<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT COMMAND CENTER v6.0 | Final Flash</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            --bg-primary: #020406; --bg-sidebar: rgba(6, 11, 20, 0.98); --bg-card: #0a0e17; 
            --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
            --accent-purple: #9d50bb; --accent-red: #ff3d6b; --accent-amber: #ffb300;
            --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); 
            --sidebar-expanded: 300px; --sidebar-collapsed: 80px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 8px; width: 420px; text-align: center; border-top: 4px solid var(--accent-blue); }
        .login-field { width: 100%; background: #050a14; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }

        .sidebar { width: var(--sidebar-expanded); background: var(--bg-sidebar); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; display: none; flex-direction: column; z-index: 1000; }
        .nav-item { padding: 20px 25px; color: var(--text-secondary); cursor: pointer; font-family: 'Orbitron'; font-size: 10px; display: flex; align-items: center; gap: 15px; border-left: 3px solid transparent; }
        .nav-item.active { background: rgba(0, 229, 255, 0.1); border-left-color: var(--accent-cyan); color: var(--accent-cyan); }

        .main-content { flex: 1; margin-left: var(--sidebar-expanded); padding: 40px; }
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; border-radius: 8px; border-bottom: 4px solid var(--accent-blue); }
        .kpi-val { font-family: 'Orbitron'; font-size: 2rem; display: block; margin-top: 10px; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 15px; height: 300px; border-radius: 8px; }
        
        .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Share Tech Mono'; font-size: 11px; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: var(--text-secondary); }

        #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .modal-content { background:var(--bg-card); border:1px solid var(--accent-blue); padding:30px; width:450px; border-radius:8px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="font-family:'Orbitron'; margin-bottom:30px;">IT SYSTEM <span>v6.0</span></h2>
        <input type="text" id="lUser" placeholder="OPERADOR" class="login-field">
        <input type="password" id="lPass" placeholder="PASSWORD" class="login-field">
        <button onclick="attemptLogin()" style="width:100%; padding:15px; background:var(--accent-blue); color:white; border:none; font-family:'Orbitron'; cursor:pointer;">ACCEDER</button>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <div style="padding:25px; font-family:'Orbitron'; color:var(--accent-cyan); font-size:12px;">COMMAND CENTER</div>
    <div class="user-card" style="padding:0 20px 20px;">
        <div id="displayUser" style="font-weight:bold; font-size:13px;">---</div>
        <div id="displayRank" style="font-size:9px; color:var(--text-secondary);">ESPECIALISTA IT</div>
    </div>
    <nav>
        <div class="nav-item active" id="navMonitor" onclick="setView('monitor')"><i class="fa-solid fa-terminal"></i> MONITOR</div>
        <div class="nav-item" id="navResolved" onclick="setView('resolved')"><i class="fa-solid fa-check-double"></i> RESUELTOS</div>
        <div class="nav-item" onclick="syncData()" style="color:var(--accent-cyan);"><i class="fa-solid fa-sync"></i> RE-SYNC</div>
    </nav>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
    <h1 id="viewTitle" style="font-family:'Orbitron'; margin-bottom:30px; letter-spacing:3px;">SISTEMA <span>ACTIVO</span></h1>
    <div class="kpi-row" id="kpiContainer"></div>
    <div class="charts-grid">
        <div class="chart-box"><h4>CARGA PRIORIDAD</h4><canvas id="chart1"></canvas></div>
        <div class="chart-box"><h4>SLA STATUS</h4><canvas id="chart2"></canvas></div>
        <div class="chart-box"><h4>TELEMETRÍA RED</h4><canvas id="chart3"></canvas></div>
    </div>
    <div class="table-container"><table><thead id="tHead"></thead><tbody id="tBody"></tbody></table></div>
</main>

<div id="modalObs">
    <div class="modal-content">
        <h3 style="font-family:'Orbitron'; color:var(--accent-cyan); margin-bottom:15px;">CERRAR TICKET #<span id="modalTicketId"></span></h3>
        <textarea id="textoObs" rows="4" placeholder="Logs de la solución..." class="login-field" style="text-align:left;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="cerrarModal()" style="flex:1; background:none; border:1px solid gray; color:white; cursor:pointer;">ATRÁS</button>
            <button onclick="enviarResolucion()" style="flex:2; background:var(--accent-green); border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer; color:black;">CONFIRMAR</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
    const USERS = { "admin": { name: "YANANTH FAJARDO", pass: "Admin2026!" } };
    let fullData = []; let charts = {}; let currentView = 'monitor'; let ticketIdResolviendo = null;

    function attemptLogin() {
        const u = document.getElementById('lUser').value.trim();
        const p = document.getElementById('lPass').value;
        if(USERS[u] && USERS[u].pass === p) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('displayUser').textContent = USERS[u].name;
            syncData();
        } else { alert("ERROR"); }
    }

    async function syncData() { 
        try { 
            const r = await fetch(SCRIPT_URL); 
            const json = await r.json();
            fullData = json.map(t => {
                let n = {};
                for (let k in t) n[k.toLowerCase().trim()] = t[k];
                return n;
            });
            updateUI(); 
        } catch(e) { console.error("Sync Error"); } 
    }

    function setView(v) { 
        currentView = v; 
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(v === 'monitor' ? 'navMonitor' : 'navResolved').classList.add('active');
        updateUI(); 
    }

    function updateUI() {
        const pend = fullData.filter(t => t.estado && t.estado.toLowerCase().trim() === 'pendiente');
        const res = fullData.filter(t => t.estado && t.estado.toLowerCase().trim() === 'resuelto');
        const box = document.getElementById('kpiContainer');
        
        if(currentView === 'monitor') {
            document.getElementById('viewTitle').innerHTML = "MONITOR <span>TICKETS ACTIVOS</span>";
            box.innerHTML = `<div class="kpi-card"><span>PENDIENTES</span><span class="kpi-val">${pend.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-red)"><span>CRÍTICOS</span><span class="kpi-val">${pend.filter(x=>x.prioridad && x.prioridad.toLowerCase().includes('alta')).length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-amber)"><span>HISTÓRICO</span><span class="kpi-val">${fullData.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-cyan)"><span>UPTIME</span><span class="kpi-val">99.9%</span></div>`;
            document.getElementById('tHead').innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>TÉCNICO</th><th>EQUIPO</th><th>ACCIÓN</th></tr>`;
            document.getElementById('tBody').innerHTML = pend.map(t => `<tr><td>#${t.id}</td><td>${t.prioridad}</td><td>${t.colaborador}</td><td>${t.dispositivo}</td><td><button onclick="abrirModal('${t.id}')" style="background:var(--accent-green); border:none; padding:5px 10px; cursor:pointer; border-radius:4px; font-family:'Orbitron'; font-size:9px;">RESOLVER</button></td></tr>`).join('');
            renderCharts(pend);
        } else {
            document.getElementById('viewTitle').innerHTML = "HISTORIAL <span>SOLUCIONADOS</span>";
            box.innerHTML = `<div class="kpi-card" style="border-bottom-color:var(--accent-green)"><span>CERRADOS</span><span class="kpi-val">${res.length}</span></div><div class="kpi-card"><span>ÉXITO</span><span class="kpi-val">100%</span></div><div class="kpi-card"><span>AVG TIME</span><span class="kpi-val">1.2h</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-purple)"><span>SISTEMA</span><span class="kpi-val">OK</span></div>`;
            document.getElementById('tHead').innerHTML = `<tr><th>ID</th><th>FECHA CIERRE</th><th>TÉCNICO</th><th>SOLUCIÓN TÉCNICA</th></tr>`;
            document.getElementById('tBody').innerHTML = res.map(t => `<tr><td style="color:var(--accent-cyan);">#${t.id}</td><td>${t['ticket resuelto'] || 'S/F'}</td><td>${t.colaborador}</td><td style="font-family:'Share Tech Mono'; font-size:11px; color:var(--accent-cyan);">${t.observaciones || 'OK'}</td></tr>`).join('');
            renderCharts(res);
        }
    }

    function renderCharts(data) {
        const c1 = document.getElementById('chart1').getContext('2d');
        const c2 = document.getElementById('chart2').getContext('2d');
        const c3 = document.getElementById('chart3').getContext('2d');
        if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();
        charts.c1 = new Chart(c1, { type: 'bar', data: { labels: ['Alta', 'Normal'], datasets: [{ data: [data.filter(x=>x.prioridad && x.prioridad.toLowerCase().includes('alta')).length, 10], backgroundColor: ['#ff3d6b', '#007bff'] }] }, options: { responsive:true, maintainAspectRatio:false } });
        charts.c2 = new Chart(c2, { type: 'doughnut', data: { labels: ['OK','SLA'], datasets: [{ data: [95, 5], backgroundColor: ['#00ffa3','#333'] }] }, options: { responsive:true, maintainAspectRatio:false } });
        charts.c3 = new Chart(c3, { type: 'line', data: { labels: ['D4','D3','D2','D1','HOY'], datasets: [{ data: [2, 8, 5, 12, 10], borderColor: '#00e5ff', fill: true }] }, options: { responsive:true, maintainAspectRatio:false } });
    }

    function abrirModal(id) { ticketIdResolviendo = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('modalObs').style.display='flex'; }
    function cerrarModal() { document.getElementById('modalObs').style.display='none'; }
    async function enviarResolucion() {
        const obs = document.getElementById('textoObs').value.trim();
        if(!obs) return;
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updateStatus", id: ticketIdResolviendo, observations: obs }) });
        cerrarModal(); setTimeout(syncData, 1500);
    }
</script>
</body>
</html>
