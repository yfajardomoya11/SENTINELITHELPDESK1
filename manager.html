<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — IT Manager Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #030508; --bg-sidebar: rgba(5, 10, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); --sidebar-w: 280px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  
  /* Grid de fondo */
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.01) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }

  /* LOGIN */
  #loginOverlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 4px; width: 400px; text-align: center; border-top: 4px solid var(--accent-blue); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
  .login-field { width: 100%; background: #0a1520; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; transition: 0.3s; }
  .btn-login:hover { background: var(--accent-blue); color: white; box-shadow: 0 0 20px var(--accent-blue); }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; transition: 0.5s; z-index: 1000; display: flex; flex-direction: column; }
  .sidebar.closed { transform: translateX(-100%); }
  .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-blue); font-size: 11px; letter-spacing: 2px; }
  
  /* PERFIL DINÁMICO */
  .user-card { margin: 20px; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.5s; }
  .user-avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
  
  /* Colores para Chris (Azul) */
  .profile-chris { background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(0, 229, 255, 0.1)); border-color: rgba(0, 123, 255, 0.3) !important; }
  .avatar-chris { background: linear-gradient(45deg, #0056b3, #00e5ff); border: 2px solid #00e5ff; }
  
  /* Colores para Admin (Morado) */
  .profile-admin { background: linear-gradient(135deg, rgba(110, 72, 170, 0.1), rgba(157, 80, 187, 0.1)); border-color: rgba(157, 80, 187, 0.3) !important; }
  .avatar-admin { background: linear-gradient(45deg, var(--accent-indigo), var(--accent-purple)); border: 2px solid var(--accent-purple); }

  .online-indicator { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono'; font-size: 9px; color: var(--accent-green); text-transform: uppercase; margin-top: 5px; }
  .dot { width: 7px; height: 7px; background: var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 163, 0.5); } 70% { box-shadow: 0 0 0 8px rgba(0, 255, 163, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 163, 0); } }
  
  .user-info .name { font-weight: 700; font-size: 13px; color: white; display: block; }
  .user-info .rank { font-size: 8px; font-family: 'Orbitron'; font-weight: 900; letter-spacing: 0.5px; }

  /* RESTO DE LA INTERFAZ */
  .nav-menu { flex: 1; padding: 10px; }
  .nav-item { padding: 15px 20px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 15px; color: var(--text-secondary); transition: 0.3s; font-size: 11px; font-weight: bold; }
  .nav-item:hover, .nav-item.active { background: rgba(0, 123, 255, 0.08); color: var(--accent-cyan); }
  .main-content { flex: 1; margin-left: var(--sidebar-w); transition: 0.5s; padding: 40px; }
  .sidebar.closed ~ .main-content { margin-left: 0; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-top: 3px solid var(--accent-blue); }
  .charts-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; height: 380px; border-radius: 12px; position: relative; }
  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); font-family: 'Share Tech Mono'; color: var(--accent-blue); }
  td { padding: 14px 18px; border-bottom: 1px solid #141824; color: var(--text-secondary); }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box" onkeydown="if(event.key==='Enter') attemptLogin()">
    <h2>IT HELP DESK <span>CONTROL</span></h2>
    <input type="text" id="lUser" placeholder="ADMIN ID" class="login-field" autocomplete="off">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field" autocomplete="off">
    <button class="btn-login" onclick="attemptLogin()">AUTENTICAR SISTEMA</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">SENTINEL PANEL CONTROL</div>
  
  <div class="user-card" id="profileCard">
    <div class="user-avatar" id="userAvatar">👨‍💻</div>
    <div class="user-info">
      <span class="name" id="displayUser">---</span>
      <span class="rank" id="displayRank">---</span>
      <div class="online-indicator"><div class="dot"></div> online</div>
    </div>
  </div>

  <nav class="nav-menu">
    <div class="nav-item active" id="navGen" onclick="setView('Todos')">📊 MONITOR GLOBAL</div>
    <div class="nav-item" id="navRes" onclick="setView('Resuelto')">🎫 TICKETS RESUELTOS</div>
    <div class="nav-item" onclick="exportToCSV()" style="color:var(--accent-amber); border-top: 1px solid var(--border-subtle); margin-top: 20px;">📄 EXPORTAR LOGS CSV</div>
  </nav>
  <button onclick="location.reload()" style="margin:20px; padding:12px; background:transparent; border:1px solid var(--accent-red); color:var(--accent-red); cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">🔒 TERMINAR SESIÓN</button>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 style="font-family:'Orbitron'; letter-spacing:5px;">SYSTEM <span>MONITOR</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 25px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">RE-SYNC DATA</button>
  </header>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="charts-grid">
    <div class="chart-box"><h4>RANKING</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4>GESTIÓN</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box"><h4>EFICIENCIA</h4><canvas id="chart3"></canvas></div>
  </div>
  <div class="table-container"><table id="mainTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
</main>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  // CONFIGURACIÓN DE PERFILES
  const USERS = {
    "admin": {
      pass: "Admin2026!",
      name: "Y. ANDRES",
      rank: "IT PROFESSIONAL",
      theme: "profile-admin",
      avatar: "avatar-admin"
    },
    "ADMIN_CHRIS": {
      pass: "CHRIS-IT2026!",
      name: "NETWORK CHRIS",
      rank: "Network and telecommunications engineer",
      theme: "profile-chris",
      avatar: "avatar-chris"
    }
  };

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const user = USERS[u];

    if(user && user.pass === p) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainDashboard').style.display = 'block';
      
      // Aplicar Perfil Táctico
      const card = document.getElementById('profileCard');
      const avatar = document.getElementById('userAvatar');
      
      card.className = "user-card " + user.theme;
      avatar.className = "user-avatar " + user.avatar;
      document.getElementById('displayUser').textContent = user.name;
      document.getElementById('displayRank').textContent = user.rank;
      
      syncData();
    } else {
      alert("⚠️ ERROR DE AUTENTICACIÓN: Credenciales no válidas.");
    }
  }

  // Lógica de datos (se mantiene igual a la versión anterior para no fallar)
  let fullData = []; let currentView = 'Todos';
  async function syncData() { try { const r=await fetch(SCRIPT_URL); fullData=await r.json(); refreshUI(); } catch(e){ console.error(e); } }
  
  function refreshUI() {
    const res = fullData.filter(t => t.estado === "Resuelto");
    const pend = fullData.filter(t => t.estado === "Pendiente");
    const kpi = document.getElementById('kpiRow');
    kpi.innerHTML = `<div class="kpi-card"><div>TOTAL</div><div style="font-size:30px; font-weight:bold">${fullData.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-amber)"><div>PENDIENTES</div><div style="font-size:30px; font-weight:bold">${pend.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-green)"><div>RESUELTOS</div><div style="font-size:30px; font-weight:bold">${res.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-red)"><div>CRÍTICOS</div><div style="font-size:30px; font-weight:bold">${pend.filter(t=>t.prioridad==="Alta").length}</div></div>`;
    
    document.getElementById('tableHead').innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>DISPOSITIVO</th><th>ESTADO</th></tr>`;
    document.getElementById('tableBody').innerHTML = fullData.map(t => `<tr><td>${t.id}</td><td>${t.prioridad}</td><td>${t.colaborador}</td><td>${t.dispositivo}</td><td>${t.estado}</td></tr>`).join('');
    renderCharts();
  }

  function renderCharts() {
    const dev = {}; fullData.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
    const ctx = document.getElementById('chart1').getContext('2d');
    if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, {
      type: 'polarArea',
      data: {
        labels: Object.keys(dev),
        datasets: [{ data: Object.values(dev), backgroundColor: ['rgba(0,123,255,0.5)', 'rgba(157,80,187,0.5)', 'rgba(0,255,163,0.5)'] }]
      },
      options: { responsive: true, maintainAspectRatio: false, scales: { r: { grid: { color: '#1a1d2d' }, ticks: { display: false } } } }
    });
  }
</script>
</body>
</html>
