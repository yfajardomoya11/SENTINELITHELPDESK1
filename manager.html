<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — IT Manager Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #030508; --bg-sidebar: rgba(5, 10, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); --sidebar-w: 280px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.01) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }

  /* LOGIN */
  #loginOverlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 4px; width: 400px; text-align: center; border-top: 4px solid var(--accent-blue); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
  .login-field { width: 100%; background: #0a1520; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; transition: 0.3s; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; display: flex; flex-direction: column; }
  .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-blue); font-size: 11px; letter-spacing: 2px; }
  
  /* PERFILES DINÁMICOS */
  .user-card { margin: 20px; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .user-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; font-family: 'Orbitron'; }
  
  /* Estilo Chris (Azul) */
  .profile-chris { background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(0, 229, 255, 0.1)); border-color: rgba(0, 123, 255, 0.4) !important; }
  .avatar-chris { background: linear-gradient(45deg, #0056b3, #00e5ff); border: 2px solid #00e5ff; color: white; text-shadow: 0 0 10px #00e5ff; }
  
  /* Estilo Admin (Morado) */
  .profile-admin { background: linear-gradient(135deg, rgba(110, 72, 170, 0.1), rgba(157, 80, 187, 0.1)); border-color: rgba(157, 80, 187, 0.4) !important; }
  .avatar-admin { background: linear-gradient(45deg, var(--accent-indigo), var(--accent-purple)); border: 2px solid var(--accent-purple); color: white; text-shadow: 0 0 10px var(--accent-purple); }

  .user-info .name { font-weight: 700; font-size: 14px; color: white; display: block; font-family: 'Rajdhani'; letter-spacing: 1px; }
  .user-info .rank { font-size: 9px; font-family: 'Orbitron'; font-weight: 900; letter-spacing: 0.5px; color: var(--text-secondary); line-height: 1.2; display: block; margin-top: 4px; }
  
  .online-tag { display: flex; align-items: center; gap: 5px; font-family: 'Share Tech Mono'; font-size: 9px; color: var(--accent-green); margin-top: 8px; text-transform: uppercase; }
  .dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); }

  /* DASHBOARD */
  .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-top: 3px solid var(--accent-blue); }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; border-radius: 12px; height: 350px; }
  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; margin-top: 30px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 15px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Orbitron'; font-size: 10px; }
  td { padding: 12px 15px; border-bottom: 1px solid #141824; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="font-family:'Orbitron'; color:var(--accent-blue); margin-bottom:30px;">SENTINEL <span>LOGIN</span></h2>
    <input type="text" id="lUser" placeholder="ADMIN ID" class="login-field">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field">
    <button class="btn-login" onclick="attemptLogin()">AUTENTICAR</button>
  </div>
</div>

<aside class="sidebar" id="sidebar" style="display:none;">
  <div class="sidebar-header">IT MANAGEMENT SYSTEM</div>
  
  <div class="user-card" id="profileCard">
    <div class="user-avatar" id="userAvatar">--</div>
    <div class="user-info">
      <span class="name" id="displayUser">---</span>
      <span class="rank" id="displayRank">---</span>
      <div class="online-tag"><div class="dot"></div> system active</div>
    </div>
  </div>

  <nav style="flex:1; padding:20px;">
    <div style="color:var(--accent-cyan); font-family:'Orbitron'; font-size:10px; margin-bottom:20px;">MENÚ PRINCIPAL</div>
    <div style="padding:10px; color:white; font-size:13px; cursor:pointer;">📊 DASHBOARD GLOBAL</div>
    <div style="padding:10px; color:var(--text-secondary); font-size:13px; cursor:pointer;">📂 HISTORIAL LOGS</div>
  </nav>
  
  <button onclick="location.reload()" style="margin:20px; padding:12px; background:none; border:1px solid var(--accent-red); color:var(--accent-red); cursor:pointer; font-family:'Orbitron'; font-size:9px;">CERRAR TERMINAL</button>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="margin-bottom:40px; display:flex; justify-content:space-between; align-items:center;">
    <h1 style="font-family:'Orbitron'; letter-spacing:4px;">SYSTEM <span>MONITOR</span></h1>
    <div id="clock" style="font-family:'Share Tech Mono'; color:var(--accent-cyan);"></div>
  </header>
  
  <div class="kpi-row" id="kpis"></div>
  
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
    <div class="chart-box"><canvas id="chart1"></canvas></div>
    <div class="chart-box"><canvas id="chart2"></canvas></div>
  </div>

  <div class="table-container">
    <table>
      <thead><tr><th>ID</th><th>COLABORADOR</th><th>GESTIÓN</th><th>DISPOSITIVO</th><th>ESTADO</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  const USERS = {
    "admin": {
      pass: "Admin2026!",
      name: "Y. ANDRES FAJARDO",
      rank: "IT SPECIALIST",
      theme: "profile-admin",
      avatar: "avatar-admin",
      initials: "AF"
    },
    "ADMIN_CHRIS": {
      pass: "CHRIS-IT2026!",
      name: "CHRIS MORALES",
      rank: "NETWORK AND TELECOMMUNICATIONS ENGINEER",
      theme: "profile-chris",
      avatar: "avatar-chris",
      initials: "CM"
    }
  };

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const user = USERS[u];

    if(user && user.pass === p) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainDashboard').style.display = 'block';
      
      const card = document.getElementById('profileCard');
      const avatar = document.getElementById('userAvatar');
      
      card.className = "user-card " + user.theme;
      avatar.className = "user-avatar " + user.avatar;
      avatar.textContent = user.initials;
      document.getElementById('displayUser').textContent = user.name;
      document.getElementById('displayRank').textContent = user.rank;
      
      fetchData();
    } else {
      alert("ACCESO DENEGADO");
    }
  }

  async function fetchData() {
    const r = await fetch(SCRIPT_URL);
    const data = await r.json();
    
    document.getElementById('kpis').innerHTML = `
      <div class="kpi-card">KPI: TOTAL<br><span style="font-size:24px;">${data.length}</span></div>
      <div class="kpi-card" style="border-color:var(--accent-amber)">KPI: PENDIENTES<br><span style="font-size:24px;">${data.filter(x=>x.estado==='Pendiente').length}</span></div>
      <div class="kpi-card" style="border-color:var(--accent-green)">KPI: RESUELTOS<br><span style="font-size:24px;">${data.filter(x=>x.estado==='Resuelto').length}</span></div>
      <div class="kpi-card" style="border-color:var(--accent-red)">KPI: CRÍTICOS<br><span style="font-size:24px;">${data.filter(x=>x.prioridad==='Alta').length}</span></div>
    `;

    document.getElementById('tableBody').innerHTML = data.map(t => `
      <tr>
        <td style="color:var(--accent-cyan); font-family:'Share Tech Mono';">${t.id}</td>
        <td>${t.colaborador}</td>
        <td>${t.gestion}</td>
        <td>${t.dispositivo}</td>
        <td><span style="color:${t.estado==='Pendiente'?'var(--accent-amber)':'var(--accent-green)'}">${t.estado}</span></td>
      </tr>
    `).join('');
  }

  setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
