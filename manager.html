<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT COMMAND CENTER — Professional Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #030508; --bg-sidebar: rgba(5, 10, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.1); --sidebar-w: 280px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.01) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }

  /* FIX AUTOFILL ESPACIOS BLANCOS */
  input:-webkit-autofill { -webkit-text-fill-color: var(--accent-cyan) !important; -webkit-box-shadow: 0 0 0px 1000px var(--bg-card) inset !important; transition: background-color 5000s; }

  /* LOGIN ORIGINAL RESTAURADO */
  #loginOverlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 4px; width: 400px; text-align: center; border-top: 4px solid var(--accent-blue); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
  .login-box h2 { font-family: 'Orbitron'; margin-bottom: 30px; letter-spacing: 3px; font-size: 20px; color: white; }
  .login-box h2 span { color: var(--accent-blue); }
  .login-field { width: 100%; background: #0a1520; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; transition: 0.3s; }
  .btn-login:hover { background: var(--accent-blue); color: white; box-shadow: 0 0 20px var(--accent-blue); }

  /* SIDEBAR INTERACTIVA */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; transition: 0.5s; z-index: 1000; display: flex; flex-direction: column; }
  .sidebar.closed { transform: translateX(-100%); }
  .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  
  /* PERFIL DE USUARIO MORADO */
  .user-card { margin: 20px; padding: 20px; background: linear-gradient(135deg, rgba(110, 72, 170, 0.08), rgba(157, 80, 187, 0.08)); border: 1px solid rgba(157, 80, 187, 0.2); border-radius: 12px; display: flex; align-items: center; gap: 15px; }
  .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, var(--accent-indigo), var(--accent-purple)); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(157, 80, 187, 0.3); font-size: 20px; }
  .online-indicator { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono'; font-size: 9px; color: var(--accent-green); text-transform: uppercase; margin-top: 5px; }
  .dot { width: 7px; height: 7px; background: var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 163, 0.5); } 70% { box-shadow: 0 0 0 8px rgba(0, 255, 163, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 163, 0); } }
  .user-info .name { font-weight: 700; font-size: 13px; color: white; display: block; }
  .user-info .rank { font-size: 9px; color: var(--accent-purple); font-family: 'Orbitron'; font-weight: 900; }

  /* NAVEGACIÓN */
  .nav-menu { flex: 1; padding: 10px; }
  .nav-item { padding: 15px 20px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 15px; color: var(--text-secondary); transition: 0.3s; font-size: 11px; font-weight: bold; }
  .nav-item:hover, .nav-item.active { background: rgba(0, 123, 255, 0.08); color: var(--accent-cyan); }

  .sidebar-toggle { position: fixed; left: 295px; top: 25px; z-index: 1001; background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--accent-blue); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; transition: 0.5s; display: flex; align-items: center; justify-content: center; }
  .sidebar.closed + .sidebar-toggle { left: 20px; transform: rotate(180deg); }

  /* MAIN CONTENT */
  .main-content { flex: 1; margin-left: var(--sidebar-w); transition: 0.5s; padding: 40px; }
  .sidebar.closed ~ .main-content { margin-left: 0; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-top: 3px solid var(--accent-blue); transition: 0.3s; }
  .kpi-card:hover { transform: translateY(-3px); border-top-color: var(--accent-cyan); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .kpi-val { font-family: 'Orbitron'; font-size: 2.2rem; color: #fff; font-weight: 900; }

  /* GRÁFICAS */
  .charts-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; height: 380px; border-radius: 12px; position: relative; }
  .chart-box h4 { font-family: 'Orbitron'; font-size: 10px; color: var(--accent-blue); margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
  .chart-label-center { position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
  .chart-label-center .percent { display: block; font-family: 'Orbitron'; font-size: 28px; font-weight: 900; color: var(--accent-cyan); text-shadow: 0 0 15px rgba(0,229,255,0.3); }

  /* TABLAS */
  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); font-family: 'Share Tech Mono'; color: var(--accent-blue); text-transform: uppercase; font-size: 11px; }
  td { padding: 14px 18px; border-bottom: 1px solid #141824; color: var(--text-secondary); }
  .badge-alta { color: #fff; background: var(--accent-red); padding: 2px 6px; border-radius: 3px; font-size: 9px; font-family: 'Orbitron'; font-weight: 900; box-shadow: 0 0 10px var(--accent-red); }
  .badge-norm { color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 2px 6px; border-radius: 3px; font-size: 9px; font-family: 'Orbitron'; }
  .critico-row { background: rgba(255, 61, 107, 0.05); }

  /* MODAL */
  #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
  .modal-content { background:var(--bg-card); border:1px solid var(--accent-blue); padding:35px; width:480px; border-radius:8px; border-top:4px solid var(--accent-blue); }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box" onkeydown="if(event.key==='Enter') attemptLogin()">
    <h2>IT HELP DESK <span>CONTROL</span></h2>
    <input type="text" id="lUser" placeholder="ADMIN ID" class="login-field" autocomplete="off">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field" autocomplete="off">
    <button class="btn-login" onclick="attemptLogin()">AUTENTICAR SISTEMA</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">IT HELP DESK PANEL CONTROL</div>
  <div class="user-card">
    <div class="user-avatar">👨‍💻</div>
    <div class="user-info">
      <span class="name" id="displayUser">Y. ANDRES</span>
      <span class="rank">IT PROFESSIONAL</span>
      <div class="online-indicator"><div class="dot"></div> online</div>
    </div>
  </div>
  <nav class="nav-menu">
    <div class="nav-item active" id="navGen" onclick="setView('Todos')">📊 MONITOR GLOBAL</div>
    <div class="nav-item" id="navRes" onclick="setView('Resuelto')">🎫 TICKETS RESUELTOS</div>
    <div class="nav-item" onclick="exportToCSV()" style="color:var(--accent-amber); border-top: 1px solid var(--border-subtle); margin-top: 20px;">📄 EXPORTAR LOGS CSV</div>
  </nav>
  <button onclick="location.reload()" style="margin:20px; padding:12px; background:transparent; border:1px solid var(--accent-red); color:var(--accent-red); cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px; font-weight:bold;">🔒 TERMINAR SESIÓN</button>
</aside>

<button class="sidebar-toggle" id="toggleBtn" onclick="toggleSidebar()">◀</button>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 style="font-family:'Orbitron'; letter-spacing:5px;" id="pageTitle">SYSTEM <span>MONITOR</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 25px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">RE-SYNC DATA</button>
  </header>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="charts-grid">
    <div class="chart-box"><h4 id="titleChart1">ESTADO</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4 id="titleChart2">ANÁLISIS</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box">
      <h4 id="titleChart3">EFICIENCIA</h4>
      <canvas id="chart3"></canvas>
      <div id="centerLabel" class="chart-label-center" style="display:none;"><span class="percent" id="effPercent">0%</span></div>
    </div>
  </div>
  <div class="table-container"><table id="mainTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
</main>

<div id="modalObs">
  <div class="modal-content">
    <h3 style="font-family:'Orbitron'; color:var(--accent-blue); margin-bottom:15px; font-size:14px;">CERRAR TICKET: <span id="modalTicketId" style="color:var(--accent-amber)"></span></h3>
    <textarea id="textoObs" rows="4" placeholder="Documente la solución técnica..." style="width:100%; background:#05070a; border:1px solid var(--border-subtle); color:white; padding:15px; font-family:'Share Tech Mono'; outline:none; resize:none; margin-bottom:25px; border-radius:4px;"></textarea>
    <div style="display:flex; gap:12px;">
      <button onclick="cerrarModal()" style="flex:1; padding:12px; background:transparent; border:1px solid var(--text-secondary); color:var(--text-secondary); cursor:pointer; font-family:'Orbitron'; font-size:10px;">CANCELAR</button>
      <button id="btnConfirmarObs" style="flex:2; padding:12px; background:linear-gradient(45deg, var(--accent-blue), var(--accent-cyan)); border:none; color:white; cursor:pointer; font-family:'Orbitron'; font-size:10px; font-weight:bold; border-radius:4px;">CONFIRMAR CIERRE</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  let fullData = []; let charts = {}; let currentView = 'Todos'; let ticketSeleccionado = "";

  function toggleSidebar() { const sb = document.getElementById('sidebar'); sb.classList.toggle('closed'); document.getElementById('toggleBtn').textContent = sb.classList.contains('closed') ? '▶' : '◀'; }
  function attemptLogin() {
    const u=document.getElementById('lUser').value.trim(); const p=document.getElementById('lPass').value;
    if((u==="admin" && p==="Admin2026!") || (u==="specialist" && p==="Soporte123")) {
      document.getElementById('loginOverlay').style.display='none'; document.getElementById('mainDashboard').style.display='block';
      document.getElementById('displayUser').textContent = u.toUpperCase();
      syncData();
    } else { alert("ACCESS DENIED"); }
  }

  async function syncData() { try { const r=await fetch(SCRIPT_URL); fullData=await r.json(); refreshUI(); } catch(e){ console.error("Sync Error"); } }
  function setView(view) { currentView = view; refreshUI(); }

  function parseDate(dateStr) {
    if(!dateStr) return null;
    let cleanStr = dateStr.toString().replace(/\//g, '-');
    let d = new Date(cleanStr);
    if(isNaN(d.getTime())){
      let parts = cleanStr.split(/[- :]/);
      if(parts.length >= 3) d = new Date(`${parts[1]}-${parts[0]}-${parts[2]} ${parts[3]||'00'}:${parts[4]||'00'}:${parts[5]||'00'}`);
    }
    return isNaN(d.getTime()) ? null : d;
  }

  function refreshUI() {
    document.getElementById('navGen').classList.toggle('active', currentView==='Todos');
    document.getElementById('navRes').classList.toggle('active', currentView==='Resuelto');
    document.getElementById('pageTitle').innerHTML = currentView === 'Todos' ? 'SYSTEM <span>MONITOR</span>' : 'TICKETS <span>RESUELTOS</span>';

    const res = fullData.filter(t => t.estado === "Resuelto");
    const pend = fullData.filter(t => t.estado === "Pendiente");
    const viewData = currentView === 'Todos' ? fullData : res;

    const kpi = document.getElementById('kpiRow');
    if(currentView === 'Todos') {
      const crit = pend.filter(t => t.prioridad === "Alta").length;
      kpi.innerHTML = `<div class="kpi-card"><div style="font-size:10px; color:var(--accent-cyan)">TOTAL TICKETS</div><div class="kpi-val">${fullData.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-amber)"><div style="font-size:10px; color:var(--accent-amber)">PENDIENTES</div><div class="kpi-val">${pend.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-green)"><div style="font-size:10px; color:var(--accent-green)">RESUELTOS</div><div class="kpi-val">${res.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-red); ${crit > 0 ? 'box-shadow: 0 0 20px rgba(255, 61, 107, 0.2);' : ''}"><div style="font-size:10px; color:var(--accent-red)">CRÍTICOS ACTIVOS 🔥</div><div class="kpi-val">${crit}</div></div>`;
      document.getElementById('tableHead').innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>DISPOSITIVO</th><th>ESTADO</th><th>ACCION</th></tr>`;
      document.getElementById('centerLabel').style.display = "none";
    } else {
      let totalMins = 0; let count = 0;
      res.forEach(t => { const s = parseDate(t.fecha); const e = parseDate(t['ticket resuelto']); if(s && e) { totalMins += (e - s) / 60000; count++; } });
      const efficiency = fullData.length > 0 ? Math.round((res.length / fullData.length) * 100) : 0;
      kpi.innerHTML = `<div class="kpi-card"><div style="font-size:10px; color:var(--accent-blue)">LOGS RESUELTOS</div><div class="kpi-val">${res.length}</div></div><div class="kpi-card" style="border-top-color:var(--accent-cyan)"><div style="font-size:10px; color:var(--accent-cyan)">TIEMPO PROM.</div><div class="kpi-val">${count>0?Math.round(totalMins/count):0} <small style="font-size:12px">MIN</small></div></div><div class="kpi-card" style="border-top-color:var(--accent-green)"><div style="font-size:10px; color:var(--accent-green)">TASA ÉXITO</div><div class="kpi-val">${efficiency}%</div></div><div class="kpi-card" style="border-top-color:var(--accent-amber)"><div style="font-size:10px; color:var(--accent-amber)">CRÍTICOS CERRADOS</div><div class="kpi-val">${res.filter(t=>t.prioridad==="Alta").length}</div></div>`;
      document.getElementById('tableHead').innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>OBSERVACIONES TÉCNICAS</th><th>DURACIÓN</th><th>ESTADO</th></tr>`;
      document.getElementById('effPercent').textContent = efficiency + "%";
      document.getElementById('centerLabel').style.display = "block";
    }

    document.getElementById('tableBody').innerHTML = viewData.map(t => {
      const pBadge = t.prioridad === 'Alta' ? '<span class="badge-alta">ALTA</span>' : '<span class="badge-norm">NORMAL</span>';
      if(currentView === 'Todos') {
        return `<tr class="${t.prioridad==='Alta'&&t.estado==='Pendiente'?'critico-row':''}"><td>${t.id}</td><td>${pBadge}</td><td>${t.colaborador}</td><td>${t.dispositivo}</td><td><span style="color:${t.estado==='Resuelto'?'var(--accent-green)':'var(--accent-amber)'}">${t.estado}</span></td><td>${t.estado==='Pendiente'?`<button onclick="abrirModal('${t.id}')" style="background:transparent; border:1px solid var(--accent-green); color:var(--accent-green); padding:5px 10px; cursor:pointer; font-family:'Share Tech Mono'; border-radius:4px;">RESOLVER</button>`:'---'}</td></tr>`;
      }
      const s = parseDate(t.fecha); const e = parseDate(t['ticket resuelto']);
      const dura = (s && e) ? Math.round(Math.abs(e - s) / 60000) + " min" : "---";
      return `<tr><td>${t.id}</td><td>${pBadge}</td><td>${t.colaborador}</td><td><div style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-secondary);" title="${t.observaciones || ''}">${t.observaciones || '---'}</div></td><td style="color:var(--accent-green); font-weight:bold;">${dura}</td><td><span style="color:var(--accent-green); font-weight:bold;">COMPLETED</span></td></tr>`;
    }).join('');
    renderCharts(viewData);
  }

  function abrirModal(id) { ticketSeleccionado = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('textoObs').value = ""; document.getElementById('modalObs').style.display = "flex"; document.getElementById('btnConfirmarObs').onclick = enviarResolucion; }
  function cerrarModal() { document.getElementById('modalObs').style.display = "none"; }

  async function enviarResolucion() {
    const obs = document.getElementById('textoObs').value.trim();
    if(!obs) { alert("ERROR: DOCUMENTATION REQUIRED"); return; }
    const btn = document.getElementById('btnConfirmarObs'); btn.disabled = true; btn.textContent = "UPLOADING...";
    try {
      await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updateStatus", id: ticketSeleccionado, newStatus: "Resuelto", observations: obs }) });
      cerrarModal(); setTimeout(syncData, 1500);
    } catch(e) { alert("NETWORK ERROR"); } finally { btn.disabled = false; btn.textContent = "CONFIRMAR CIERRE"; }
  }

  function renderCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();
    const common = { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8b9bb4', font: { family: 'Rajdhani', size: 10 } } } } };

    if(currentView === 'Todos') {
      document.getElementById('titleChart1').textContent = "MAPA DE RED INCIDENCIAS";
      const dev = {}; data.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
      charts.c1 = new Chart(ctx1, { type:'radar', data:{ labels:Object.keys(dev), datasets:[{ label:'Tickets', data:Object.values(dev), backgroundColor:'rgba(0, 123, 255, 0.1)', borderColor:'#007bff', borderWidth:2, pointBackgroundColor:'#00e5ff' }]}, options: { ...common, scales:{ r:{ grid:{color:'#1a1d2d'}, angleLines:{color:'#1a1d2d'}, pointLabels:{color:'#8b9bb4'}, ticks:{display:false} } } } });
      charts.c2 = new Chart(ctx2, { type:'doughnut', data:{ labels:['Alta', 'Normal'], datasets:[{ data:[data.filter(t=>t.prioridad==='Alta').length, data.filter(t=>t.prioridad!=='Alta').length], backgroundColor:['#ff3d6b', '#141824'], borderColor:['#ff3d6b','#00e5ff'], borderWidth:1 }]}, options: { ...common, cutout:'75%' } });
      charts.c3 = new Chart(ctx3, { type:'doughnut', data:{ labels:['Resueltos','Pendientes'], datasets:[{ data:[data.filter(t=>t.estado==='Resuelto').length, data.filter(t=>t.estado==='Pendiente').length], backgroundColor:['#00ffa3','#1a1d2d'], circumference:180, rotation:270 }]}, options: { ...common, cutout:'85%' } });
    } else {
      // --- RANKING INNOVADOR: POLAR AREA ---
      document.getElementById('titleChart1').textContent = "HUELA TÉCNICA DE RESOLUCIÓN";
      const dev = {}; data.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
      charts.c1 = new Chart(ctx1, {
        type: 'polarArea',
        data: {
          labels: Object.keys(dev),
          datasets: [{
            data: Object.values(dev),
            backgroundColor: ['rgba(0,123,255,0.5)', 'rgba(0,229,255,0.5)', 'rgba(0,255,163,0.5)', 'rgba(157,80,187,0.5)', 'rgba(255,179,0,0.5)'],
            borderColor: '#0a0e17', borderWidth: 2
          }]
        },
        options: { ...common, scales: { r: { grid: { color: 'rgba(139,155,180,0.1)' }, angleLines: { color: 'rgba(139,155,180,0.1)' }, ticks: { display: false }, pointLabels: { display: true, centerPointLabels: true, font: { family: 'Rajdhani', size: 11, weight: '700' }, color: '#f0f5ff' } } }, plugins: { legend: { position: 'right', labels: { color: '#8b9bb4', font: { family: 'Share Tech Mono', size: 10 } } } } }
      });

      document.getElementById('titleChart2').textContent = "DISTRIBUCIÓN TÁCTICA GESTIÓN";
      const gP = data.filter(t => (t.gestion||t['gestión'])==='Preventivo').length; 
      const gC = data.filter(t => (t.gestion||t['gestión'])==='Correctivo').length;
      charts.c2 = new Chart(ctx2, { type:'doughnut', data:{ labels:['Prev', 'Corr'], datasets:[{ data:[gP, gC], backgroundColor:['#00e5ff', '#007bff'], borderWidth: 0 }]}, options: { ...common, cutout:'80%', circumference: 180, rotation: 270 } });

      const eff = fullData.length > 0 ? Math.round((data.length / fullData.length) * 100) : 0;
      charts.c3 = new Chart(ctx3, { type:'doughnut', data:{ datasets:[{ data:[eff, 100-eff], backgroundColor:['#00ffa3', '#1a1d2d'], borderWidth:0 }]}, options: { ...common, cutout:'85%', plugins:{legend:{display:false}} } });
    }
  }

  function exportToCSV() {
    let csv = "ID,Colaborador,Gestion,Dispositivo,Falla,Entrada,Resuelto_El,Estado,Prioridad,Observaciones\n";
    fullData.forEach(t => { csv += `${t.id},${t.colaborador},${t.gestion},${t.dispositivo},${t.falla},${t.fecha},${t['ticket resuelto'] || ''},${t.estado},${t.prioridad},${(t.observaciones||'').replace(/,/g, ';')}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = 'IT_SYSTEM_LOGS.csv'; link.click();
  }
</script>
