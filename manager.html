<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — IT COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
  :root { 
    --bg-primary: #020406; --bg-sidebar: rgba(6, 11, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); 
    --sidebar-expanded: 300px; --sidebar-collapsed: 80px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  
  /* FIX AUTOFILL */
  input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--accent-cyan) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--bg-card) inset !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px); background-size: 35px 35px; pointer-events: none; z-index: 0; }

  /* LOGIN */
  #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 8px; width: 420px; text-align: center; border-top: 4px solid var(--accent-blue); }
  .pass-container { position: relative; width: 100%; }
  .login-field { width: 100%; background: #050a14; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .toggle-pass { position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--accent-blue); font-size: 10px; font-family: 'Orbitron'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

  /* SIDEBAR COLAPSABLE */
  .sidebar { 
    width: var(--sidebar-expanded); background: var(--bg-sidebar); backdrop-filter: blur(25px); 
    border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; 
    z-index: 1000; display: none; flex-direction: column; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  .sidebar.collapsed { width: var(--sidebar-collapsed); }

  .sidebar-header { 
    padding: 30px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-cyan); font-size: 10px; 
  }
  .toggle-btn { cursor: pointer; font-size: 20px; color: var(--accent-cyan); transition: 0.3s; }
  .toggle-btn:hover { text-shadow: 0 0 10px var(--accent-cyan); }

  .user-card { margin: 25px 15px; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
  .sidebar.collapsed .user-info { display: none; }
  
  .user-avatar { min-width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; border: 2px solid #fff; font-size: 18px; }

  .nav-item { padding: 20px 25px; color: var(--text-secondary); cursor: pointer; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 1px; transition: 0.3s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 20px; white-space: nowrap; }
  .nav-item i { font-size: 18px; min-width: 25px; text-align: center; }
  .sidebar.collapsed .nav-text { display: none; }
  
  .nav-item:hover, .nav-item.active { background: rgba(0, 229, 255, 0.1); border-left-color: var(--accent-cyan); color: var(--accent-cyan); }

  /* MAIN CONTENT */
  .main-content { 
    flex: 1; margin-left: var(--sidebar-expanded); padding: 40px; 
    width: calc(100% - var(--sidebar-expanded)); transition: 0.4s ease; 
  }
  body.sidebar-is-collapsed .main-content { 
    margin-left: var(--sidebar-collapsed); 
    width: calc(100% - var(--sidebar-collapsed)); 
  }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 8px; position: relative; }
  .kpi-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent-blue); }
  .kpi-val { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; color: #fff; display: block; margin-top: 10px; }

  .charts-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; height: 380px; border-radius: 12px; }
  .chart-box h4 { font-family: 'Orbitron'; font-size: 10px; color: var(--accent-cyan); margin-bottom: 20px; letter-spacing: 2px; }

  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Share Tech Mono'; font-size: 11px; }
  td { padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: var(--text-secondary); }

  #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(15px); }
  .modal-content { background:var(--bg-card); border:1px solid var(--accent-blue); padding:40px; width:500px; border-radius:12px; border-top: 4px solid var(--accent-blue); }
</style>
</head>
<body class="">

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="font-family:'Orbitron'; color:white; margin-bottom:30px;">IT HELP DESK <span>CONTROL</span></h2>
    <input type="text" id="lUser" placeholder="ID OPERADOR" class="login-field" onkeypress="handleEnter(event)">
    <div class="pass-container">
      <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field" onkeypress="handleEnter(event)">
      <span class="toggle-pass" onclick="togglePassword()">VER</span>
    </div>
    <button class="btn-login" onclick="attemptLogin()">AUTENTICAR SISTEMA</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="nav-text">COMMAND CENTER v2.8</span>
    <div class="toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
  </div>
  <div class="user-card" id="profileCard" style="border-color:var(--accent-purple)">
    <div class="user-avatar" style="background:var(--accent-purple)" id="userAvatar">YF</div>
    <div class="user-info">
      <span class="name" id="displayUser" style="font-weight:700; font-size:13px; display:block;">---</span>
      <span class="rank" id="displayRank" style="font-size:8px; font-family:'Orbitron'; color:var(--text-secondary);">---</span>
    </div>
  </div>
  <nav>
    <div class="nav-item active" id="navMonitor" onclick="setView('monitor')">
      <i class="fa-solid fa-chart-line"></i>
      <span class="nav-text">MONITOR GENERAL</span>
    </div>
    <div class="nav-item" id="navResolved" onclick="setView('resolved')">
      <i class="fa-solid fa-ticket"></i>
      <span class="nav-text">TICKETS RESUELTOS</span>
    </div>
    <div class="nav-item" onclick="exportToCSV()" style="color:var(--accent-amber)">
      <i class="fa-solid fa-file-csv"></i>
      <span class="nav-text">REPORTE AUDITORÍA</span>
    </div>
  </nav>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 id="viewTitle" style="font-family:'Orbitron'; font-size:22px; letter-spacing:5px;">MONITOR <span>GENERAL</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 25px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">RE-SYNC DATA</button>
  </header>
  
  <div class="kpi-row" id="kpiContainer"></div>
  <div class="charts-grid">
    <div class="chart-box"><h4 id="chartLabel1">RADAR DE INCIDENCIAS</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4>VOLUMEN OPERATIVO</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box"><h4>PERFORMANCE TI</h4><canvas id="chart3"></canvas></div>
  </div>
  <div class="table-container"><table id="mainTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
</main>

<div id="modalObs">
  <div class="modal-content">
    <h3 style="font-family:'Orbitron'; color:var(--accent-cyan); margin-bottom:15px; font-size:14px;">RESOLVER NODO: <span id="modalTicketId"></span></h3>
    <textarea id="textoObs" rows="5" placeholder="Logs técnicos de solución..." style="width:100%; background:#050a14; border:1px solid var(--border-subtle); color:white; padding:20px; margin-bottom:25px; outline:none; font-family:'Share Tech Mono';"></textarea>
    <div style="display:flex; gap:15px;"><button onclick="cerrarModal()" style="flex:1; background:none; border:1px solid gray; color:white; cursor:pointer;">ABORTAR</button><button onclick="enviarResolucion()" style="flex:2; background:var(--accent-green); border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer;">CERRAR TICKET</button></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  const USERS = {
    "admin": { name: "YANANTH FAJARDO MOYA", rank: "DEVSECOPS SPECIALIST", pass: "Admin2026!", init: "YF" },
    "ADMIN_CHRIS": { name: "CHRIS MORALES", rank: "NETWORK ENGINEER", pass: "CHRIS-IT2026!", init: "CM" }
  };

  let fullData = []; let charts = {}; let currentView = 'monitor'; let currentUser = null; let ticketIdResolviendo = "";

  function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const body = document.body;
    sb.classList.toggle('collapsed');
    body.classList.toggle('sidebar-is-collapsed');
    setTimeout(() => { updateUI(); }, 400);
  }

  function togglePassword() {
    const p = document.getElementById('lPass');
    const b = document.querySelector('.toggle-pass');
    p.type = (p.type === "password") ? "text" : "password";
    b.textContent = (p.type === "password") ? "VER" : "OCULTAR";
  }

  function handleEnter(e) { if (e.key === 'Enter') attemptLogin(); }

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const admin = USERS[u];
    if(admin && admin.pass === p) {
      currentUser = admin;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainDashboard').style.display = 'block';
      document.getElementById('displayUser').textContent = admin.name;
      document.getElementById('displayRank').textContent = admin.rank;
      document.getElementById('userAvatar').textContent = admin.init;
      syncData();
    } else { alert("ERROR DE ACCESO"); }
  }

  async function syncData() { try { const r=await fetch(SCRIPT_URL); fullData=await r.json(); updateUI(); } catch(e){ console.error(e); } }
  
  function setView(v) { 
    currentView = v; 
    document.getElementById('navMonitor').classList.toggle('active', v === 'monitor');
    document.getElementById('navResolved').classList.toggle('active', v === 'resolved');
    updateUI(); 
  }

  function updateUI() {
    const pend = fullData.filter(t => t.estado === 'Pendiente');
    const res = fullData.filter(t => t.estado === 'Resuelto');
    const box = document.getElementById('kpiContainer');
    const body = document.getElementById('tableBody');
    const head = document.getElementById('tableHead');
    
    if(currentView === 'monitor') {
      document.getElementById('viewTitle').innerHTML = "MONITOR <span>GENERAL</span>";
      document.getElementById('chartLabel1').textContent = "RADAR DE INCIDENCIAS";
      box.innerHTML = `<div class="kpi-card"><span class="kpi-label">ACTIVAS</span><span class="kpi-val">${pend.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-red)"><span class="kpi-label">ALTA PRIORIDAD</span><span class="kpi-val">${pend.filter(x=>x.prioridad==='Alta').length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-amber)"><span class="kpi-label">PENDIENTES</span><span class="kpi-val">${pend.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-green)"><span class="kpi-label">SLA</span><span class="kpi-val">UP</span></div>`;
      head.innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>DISPOSITIVO</th><th>ESTADO</th><th>ACCION</th></tr>`;
      body.innerHTML = pend.map(t => `<tr><td style="color:var(--accent-cyan); font-weight:bold;">#${t.id}</td><td>${t.prioridad}</td><td>${t.colaborador}</td><td>${t.dispositivo}</td><td>ACTIVO</td><td><button onclick="abrirModal('${t.id}')" style="background:var(--accent-green); color:black; padding:5px 10px; border:none; cursor:pointer; font-family:'Orbitron'; font-size:9px; border-radius:4px;">RESOLVER</button></td></tr>`).join('');
      renderCharts(pend);
    } else {
      document.getElementById('viewTitle').innerHTML = "TICKETS <span>RESUELTOS</span>";
      document.getElementById('chartLabel1').textContent = "SLA TIME RESPONSE";
      box.innerHTML = `<div class="kpi-card" style="border-bottom-color:var(--accent-green)"><span class="kpi-label">LOGS OK</span><span class="kpi-val">${res.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-cyan)"><span class="kpi-label">EXITO CIERRE</span><span class="kpi-val">98%</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-blue)"><span class="kpi-label">AUDITADOS</span><span class="kpi-val">${res.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-purple)"><span class="kpi-label">STATUS</span><span class="kpi-val">CLOSED</span></div>`;
      head.innerHTML = `<tr><th>ID</th><th>TECNICO</th><th>SOLUCION</th><th>FECHA</th><th>ESTADO</th></tr>`;
      body.innerHTML = res.map(t => `<tr><td style="color:var(--accent-cyan); font-weight:bold;">#${t.id}</td><td>${t.colaborador}</td><td>${t.observaciones||'OK'}</td><td>${t['ticket resuelto']||'---'}</td><td style="color:var(--accent-green)">CERRADO</td></tr>`).join('');
      renderCharts(res);
    }
  }

  function renderCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();

    const dev = {}; data.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
    const opts = { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, color: '#8b9bb4' }, grid: { display: false } }, x: { ticks: { color: '#8b9bb4' }, grid: { display: false } }, r: { angleLines: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false }, pointLabels: { color: '#8b9bb4', font: { size: 10 } } } }, plugins: { legend: { labels: { color: '#8b9bb4' } } } };

    if(currentView === 'monitor') {
      charts.c1 = new Chart(ctx1, { type: 'radar', data: { labels: Object.keys(dev), datasets: [{ label: 'Tickets', data: Object.values(dev), borderColor: '#00e5ff', backgroundColor: 'rgba(0,229,255,0.2)', fill: true }] }, options: opts });
    } else {
      charts.c1 = new Chart(ctx1, { type: 'line', data: { labels: data.slice(-7).map(t=>t.id), datasets: [{ label: 'Horas', data: [2, 1, 3, 1, 0.5, 2, 1], borderColor: '#00ffa3', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,163,0.1)' }] }, options: opts });
    }
    charts.c2 = new Chart(ctx2, { type: 'bar', data: { labels: ['Alta', 'Normal'], datasets: [{ label: 'Volumen', data: [data.filter(t=>t.prioridad==='Alta').length, data.filter(t=>t.prioridad!=='Alta').length], backgroundColor: ['#ff3d6b', '#007bff'] }] }, options: opts });
    charts.c3 = new Chart(ctx3, { type: 'polarArea', data: { labels: ['Net', 'Sec', 'HW', 'SW', 'Ops'], datasets: [{ data: [15, 25, 20, 30, 10], backgroundColor: ['#00ffa3', '#9d50bb', '#007bff', '#ffb300', '#ff3d6b'] }] }, options: opts });
  }

  function exportToCSV() {
    let csv = "ID,Colaborador,Gestion,Dispositivo,Estado,Prioridad,Solucion,Fecha_Resolucion\n";
    fullData.forEach(t => {
      csv += `${t.id},${t.colaborador},${t.gestion},${t.dispositivo},${t.estado},${t.prioridad},"${(t.observaciones || '').replace(/"/g, '""')}",${t['ticket resuelto'] || ''}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `AUDITORIA_SENTINEL_${new Date().toLocaleDateString()}.csv`;
    link.click();
  }

  function abrirModal(id) { ticketIdResolviendo = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('modalObs').style.display='flex'; }
  function cerrarModal() { document.getElementById('modalObs').style.display='none'; }
  async function enviarResolucion() {
    const obs = document.getElementById('textoObs').value.trim();
    if(!obs) return alert("LOG TÉCNICO REQUERIDO");
    try {
      await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updateStatus", id: ticketIdResolviendo, newStatus: "Resuelto", observations: obs }) });
      cerrarModal(); setTimeout(syncData, 1500);
    } catch(e) { console.error(e); }
  }
</script>
</body>
</html>
