<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — DEVSECOPS COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #020406; --bg-sidebar: rgba(6, 11, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.2); --sidebar-w: 280px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  
  /* GRID BACKGROUND */
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

  /* LOGIN OVERLAY */
  #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 8px; width: 420px; text-align: center; border-top: 4px solid var(--accent-blue); box-shadow: 0 0 50px rgba(0, 123, 255, 0.2); }
  .login-field { width: 100%; background: #050a14; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; transition: 0.3s; }
  .login-field:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
  .btn-login:hover { background: var(--accent-blue); color: white; box-shadow: 0 0 30px var(--accent-blue); }

  /* SIDEBAR MAESTRO */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(25px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; display: none; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
  .sidebar-header { padding: 45px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-cyan); font-size: 12px; letter-spacing: 3px; }
  
  .user-card { margin: 25px 15px; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .theme-fajardo { background: linear-gradient(135deg, rgba(157, 80, 187, 0.2), rgba(110, 72, 170, 0.1)); border-color: var(--accent-purple) !important; }
  .theme-chris { background: linear-gradient(135deg, rgba(0, 123, 255, 0.2), rgba(0, 229, 255, 0.1)); border-color: var(--accent-blue) !important; }

  .user-avatar { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; font-family: 'Orbitron'; transform: rotate(-5deg); border: 2px solid #fff; }
  .avatar-fajardo { background: var(--accent-purple); box-shadow: 0 0 15px var(--accent-purple); }
  .avatar-chris { background: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); }

  .nav-menu { flex: 1; padding: 10px; }
  .nav-item { padding: 15px 20px; color: var(--text-secondary); cursor: pointer; font-family: 'Rajdhani'; font-weight: 700; border-radius: 8px; margin-bottom: 8px; transition: 0.3s; position: relative; overflow: hidden; }
  .nav-item::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 2px; background: var(--accent-cyan); transition: 0.3s; }
  .nav-item:hover { background: rgba(0, 229, 255, 0.05); color: #fff; }
  .nav-item:hover::after { width: 100%; }
  .nav-item.active { background: rgba(0, 229, 255, 0.1); color: var(--accent-cyan); }

  /* MAIN CONTENT */
  .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; width: calc(100% - var(--sidebar-w)); }
  
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 8px; position: relative; }
  .kpi-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:3px; background: var(--accent-blue); }
  .kpi-label { font-family: 'Orbitron'; font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; }
  .kpi-val { font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: #fff; display: block; margin-top: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

  /* CHARTS MODERNOS */
  .charts-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 25px; margin-bottom: 40px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 15px; height: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .chart-box h4 { font-family: 'Orbitron'; font-size: 11px; color: var(--accent-cyan); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

  /* TABLA PRO */
  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 20px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Share Tech Mono'; text-transform: uppercase; font-size: 12px; }
  td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-secondary); font-size: 14px; }
  
  .btn-resolve { background: var(--accent-green); color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-family: 'Orbitron'; font-size: 9px; font-weight: 900; cursor: pointer; transition: 0.3s; }
  .btn-resolve:hover { background: #fff; transform: scale(1.1); box-shadow: 0 0 15px var(--accent-green); }

  /* MODAL */
  #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(15px); }
  .modal-content { background:var(--bg-card); border:1px solid var(--accent-blue); padding:40px; width:500px; border-radius:15px; box-shadow: 0 0 50px rgba(0, 123, 255, 0.3); }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="font-family:'Orbitron'; color:white; margin-bottom:5px;">SENTINEL <span>PRO</span></h2>
    <p style="color:var(--accent-blue); font-family:'Share Tech Mono'; font-size:10px; margin-bottom:30px;">ENCRYPTED COMMAND INTERFACE</p>
    <input type="text" id="lUser" placeholder="OPERATOR ID" class="login-field">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field">
    <button class="btn-login" onclick="attemptLogin()">INITIATE SYSTEM</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">COMMAND CENTER v2.0</div>
  <div class="user-card" id="profileCard">
    <div class="user-avatar" id="userAvatar">--</div>
    <div class="user-info">
      <span class="name" id="displayUser">---</span>
      <span class="rank" id="displayRank">---</span>
    </div>
  </div>
  <nav class="nav-menu">
    <div class="nav-item active" onclick="setView('Todos')">📊 TELEMETRÍA GLOBAL</div>
    <div class="nav-item" onclick="setView('Resuelto')">🎫 NODOS RESUELTOS</div>
    <div class="nav-item" onclick="exportToCSV()" style="color:var(--accent-amber)">📄 DOWNLOAD LOGS</div>
  </nav>
  <button onclick="location.reload()" style="margin:20px; padding:12px; background:rgba(255,61,107,0.1); border:1px solid var(--accent-red); color:var(--accent-red); cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">TERMINAR SESIÓN</button>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 style="font-family:'Orbitron'; font-size:24px; letter-spacing:8px;">CENTRAL <span>MONITOR</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:12px 30px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px; transition:0.3s;">RE-SYNC DATA</button>
  </header>
  
  <div class="kpi-row" id="kpiRow"></div>

  <div class="charts-grid">
    <div class="chart-box"><h4>DEVICE DISTRIBUTION</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4>INCIDENT STATUS</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box"><h4>SYSTEM RESOLUTION</h4><canvas id="chart3"></canvas></div>
  </div>

  <div class="table-container">
    <table>
      <thead><tr><th>ID</th><th>PRIORITY</th><th>OPERATOR</th><th>DEVICE</th><th>STATUS</th><th>COMMAND</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<div id="modalObs">
  <div class="modal-content">
    <h3 style="font-family:'Orbitron'; color:var(--accent-cyan); margin-bottom:20px;">RESOLVE NODE: <span id="modalTicketId" style="color:var(--accent-amber)"></span></h3>
    <textarea id="textoObs" rows="5" placeholder="Enter technical resolution logs..." style="width:100%; background:#050a14; border:1px solid var(--border-subtle); color:white; padding:20px; margin-bottom:25px; font-family:'Share Tech Mono'; outline:none;"></textarea>
    <div style="display:flex; gap:15px;">
      <button onclick="cerrarModal()" style="flex:1; padding:15px; background:transparent; border:1px solid var(--text-secondary); color:white; font-family:'Orbitron'; cursor:pointer;">ABORT</button>
      <button id="btnConfirmarObs" onclick="enviarResolucion()" style="flex:2; padding:15px; background:var(--accent-cyan); border:none; color:#000; font-family:'Orbitron'; font-weight:bold; cursor:pointer;">EXECUTE CLOSURE</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  const USERS = {
    "admin": {
      pass: "Admin2026!", name: "Y. FAJARDO",
      rank: "DEVSECOPS DEVELOPER & CYBERSECURITY SPECIALIST",
      theme: "theme-fajardo", avatar: "avatar-fajardo", init: "YF"
    },
    "ADMIN_CHRIS": {
      pass: "CHRIS-IT2026!", name: "CHRIS MORALES",
      rank: "NETWORK AND TELECOMMUNICATIONS ENGINEER",
      theme: "theme-chris", avatar: "avatar-chris", init: "CM"
    }
  };

  let fullData = []; let charts = {}; let currentView = 'Todos'; let ticketSeleccionado = "";

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const admin = USERS[u];

    if(admin && admin.pass === p) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainDashboard').style.display = 'block';
      
      document.getElementById('profileCard').className = "user-card " + admin.theme;
      document.getElementById('userAvatar').className = "user-avatar " + admin.avatar;
      document.getElementById('userAvatar').textContent = admin.init;
      document.getElementById('displayUser').textContent = admin.name;
      document.getElementById('displayRank').textContent = admin.rank;
      
      syncData();
    } else { alert("ACCESS DENIED: INVALID CREDENTIALS"); }
  }

  async function syncData() { 
    try { 
      const r = await fetch(SCRIPT_URL); 
      fullData = await r.json(); 
      refreshUI(); 
    } catch(e) { console.error("Data Sync Failure"); } 
  }

  function refreshUI() {
    const pend = fullData.filter(t => t.estado === "Pendiente");
    const res = fullData.filter(t => t.estado === "Resuelto");
    const viewData = currentView === 'Todos' ? fullData : res;

    document.getElementById('kpiRow').innerHTML = `
      <div class="kpi-card" style="border-top-color:var(--accent-blue)"><span class="kpi-label">TOTAL NODES</span><span class="kpi-val">${fullData.length}</span></div>
      <div class="kpi-card" style="border-top-color:var(--accent-amber)"><span class="kpi-label">ACTIVE ALERTS</span><span class="kpi-val">${pend.length}</span></div>
      <div class="kpi-card" style="border-top-color:var(--accent-green)"><span class="kpi-label">RESOLVED</span><span class="kpi-val">${res.length}</span></div>
      <div class="kpi-card" style="border-top-color:var(--accent-red)"><span class="kpi-label">CRITICAL</span><span class="kpi-val">${pend.filter(t=>t.prioridad==="Alta").length}</span></div>
    `;

    document.getElementById('tableBody').innerHTML = viewData.map(t => `
      <tr>
        <td style="color:var(--accent-cyan); font-family:'Share Tech Mono'; font-weight:bold;">#${t.id}</td>
        <td style="color:${t.prioridad==='Alta'?'var(--accent-red)':'var(--text-secondary)'}">${t.prioridad.toUpperCase()}</td>
        <td>${t.colaborador}</td>
        <td>${t.dispositivo}</td>
        <td style="color:${t.estado==='Resuelto'?'var(--accent-green)':'var(--accent-amber)'}">${t.estado.toUpperCase()}</td>
        <td>${t.estado==='Pendiente'?`<button class="btn-resolve" onclick="abrirModal('${t.id}')">EXECUTE</button>`:'<span style="color:var(--text-secondary); font-size:10px;">CLOSED</span>'}</td>
      </tr>
    `).join('');
    renderCharts(viewData);
  }

  function renderCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();
    
    const devCounts = {}; data.forEach(t => devCounts[t.dispositivo] = (devCounts[t.dispositivo] || 0) + 1);
    
    const commonOpts = { 
      responsive: true, maintainAspectRatio: false, 
      plugins: { legend: { labels: { color: '#8b9bb4', font: { family: 'Rajdhani', size: 10 } } } }
    };

    // Chart 1: Polar Area (Neón)
    charts.c1 = new Chart(ctx1, {
      type: 'polarArea',
      data: {
        labels: Object.keys(devCounts),
        datasets: [{
          data: Object.values(devCounts),
          backgroundColor: ['rgba(0,123,255,0.6)', 'rgba(157,80,187,0.6)', 'rgba(0,255,163,0.6)', 'rgba(255,179,0,0.6)'],
          borderWidth: 0
        }]
      },
      options: { ...commonOpts, scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } } }
    });

    // Chart 2: Doughnut Neón
    charts.c2 = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: ['Pendientes', 'Resueltos'],
        datasets: [{
          data: [fullData.filter(t=>t.estado==='Pendiente').length, fullData.filter(t=>t.estado==='Resuelto').length],
          backgroundColor: ['#ffb300', '#00ffa3'],
          hoverOffset: 15,
          borderWidth: 0
        }]
      },
      options: { ...commonOpts, cutout: '80%' }
    });

    // Chart 3: Radar (Métrica de Eficiencia)
    charts.c3 = new Chart(ctx3, {
      type: 'radar',
      data: {
        labels: ['Hardware', 'Software', 'Red', 'Seguridad', 'Soporte'],
        datasets: [{
          label: 'Performance',
          data: [80, 90, 70, 95, 85],
          borderColor: var('--accent-cyan'),
          backgroundColor: 'rgba(0, 229, 255, 0.2)',
          fill: true
        }]
      },
      options: { ...commonOpts, scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#8b9bb4' }, ticks: { display: false } } } }
    });
  }

  function abrirModal(id) { ticketSeleccionado = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('modalObs').style.display = "flex"; }
  function cerrarModal() { document.getElementById('modalObs').style.display = "none"; }
  
  async function enviarResolucion() {
    const obs = document.getElementById('textoObs').value.trim();
    if(!obs) { alert("ERROR: DOCUMENTATION REQUIRED TO CLOSE NODE"); return; }
    
    const btn = document.getElementById('btnConfirmarObs');
    btn.disabled = true; btn.textContent = "UPLOADING LOGS...";

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: "updateStatus", id: ticketSeleccionado, newStatus: "Resuelto", observations: obs })
      });
      cerrarModal();
      setTimeout(syncData, 1500);
    } catch(e) { alert("NETWORK ERROR: LOGS NOT SAVED"); } finally { btn.disabled = false; btn.textContent = "EXECUTE CLOSURE"; }
  }

  function setView(v) { currentView = v; refreshUI(); }
  function exportToCSV() {
    let csv = "ID,Prioridad,Colaborador,Dispositivo,Estado\n";
    fullData.forEach(t => { csv += `${t.id},${t.prioridad},${t.colaborador},${t.dispositivo},${t.estado}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = 'SENTINEL_SECURITY_LOGS.csv'; link.click();
  }
</script>
</body>
</html>
