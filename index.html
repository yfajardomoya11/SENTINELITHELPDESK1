<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Incidencias | IT Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #020406; --card: #0a0e17; --blue: #007bff; --cyan: #00e5ff;
            --green: #00ffa3; --amber: #ffb300; --text: #f0f5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #0a1428 0%, #020406 100%);
        }
        .form-container {
            background: var(--card); border: 1px solid rgba(0, 123, 255, 0.2);
            padding: 40px; border-radius: 15px; width: 100%; max-width: 600px;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.1); border-top: 4px solid var(--blue);
        }
        h2 { font-family: 'Orbitron'; color: var(--cyan); margin-bottom: 10px; text-align: center; letter-spacing: 2px; }
        p.subtitle { text-align: center; font-size: 12px; color: #8b9bb4; margin-bottom: 30px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-family: 'Orbitron'; font-size: 10px; color: var(--blue); letter-spacing: 1px; }
        
        input, select, textarea {
            width: 100%; background: #050a14; border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 12px; color: white; border-radius: 5px; outline: none; font-family: 'Rajdhani'; font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); }

        .type-info {
            background: rgba(0, 229, 255, 0.05); padding: 15px; border-radius: 5px;
            font-size: 13px; margin-top: 10px; border-left: 3px solid var(--cyan); display: none;
        }

        .btn-submit {
            width: 100%; background: var(--blue); color: white; border: none;
            padding: 18px; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; transition: 0.3s; letter-spacing: 2px; margin-top: 20px;
        }
        .btn-submit:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }
        
        .success-msg { display: none; text-align: center; color: var(--green); font-family: 'Orbitron'; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>GENERADOR DE REPORTES IT</h2>
    <p class="subtitle">Sentinel Defense Unit - Registro de Incidencias</p>

    <form id="reportForm">
        <div class="input-group">
            <label>NOMBRE DEL COLABORADOR</label>
            <input type="text" id="colaborador" placeholder="Ej: Chris Morales" required>
        </div>

        <div class="input-group">
            <label>CATEGORÍA DEL EQUIPO</label>
            <select id="categoria" required>
                <option value="">Seleccione Categoría...</option>
                <option value="Infraestructura Core">Infraestructura Core (Routers/Switches)</option>
                <option value="Estaciones de Trabajo">Estaciones de Trabajo (PC/Laptops)</option>
                <option value="Periféricos">Periféricos (Impresoras/Scanner)</option>
                <option value="Conectividad">Conectividad (Wi-Fi/Cables)</option>
            </select>
        </div>

        <div class="input-group">
            <label>TIPO DE INTERVENCIÓN IT</label>
            <select id="tipoIntervencion" onchange="mostrarExplicacion()" required>
                <option value="">Seleccione Tipo...</option>
                <option value="Preventivo">Mantenimiento Preventivo</option>
                <option value="Correctivo">Mantenimiento Correctivo</option>
            </select>
            <div id="explicacion" class="type-info"></div>
        </div>

        <div class="input-group">
            <label>DESCRIPCIÓN DE LA FALLA / SOLICITUD</label>
            <textarea id="descripcion" rows="4" placeholder="Describa brevemente el problema o la tarea a realizar..." required></textarea>
        </div>

        <div class="input-group">
            <label>PRIORIDAD ESTIMADA</label>
            <select id="prioridad">
                <option value="Baja">Baja - No afecta operación</option>
                <option value="Media" selected>Media - Afecta parcialmente</option>
                <option value="Alta">Alta - Operación detenida</option>
            </select>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">ENVIAR REPORTE AL DASHBOARD</button>
        <div id="success" class="success-msg"><i class="fa-solid fa-circle-check"></i> REPORTE ENVIADO EXITOSAMENTE</div>
    </form>
</div>

<script>
    // URL de tu Google Apps Script
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";

    function mostrarExplicacion() {
        const tipo = document.getElementById('tipoIntervencion').value;
        const box = document.getElementById('explicacion');
        
        if (tipo === 'Preventivo') {
            box.style.display = 'block';
            box.style.borderColor = 'var(--green)';
            box.innerHTML = "<strong>MANTENIMIENTO PREVENTIVO:</strong> Tareas programadas para evitar fallos. (Ej: Limpieza, actualizaciones, revisión de cables). Ayuda a mantener el Health Score alto.";
        } else if (tipo === 'Correctivo') {
            box.style.display = 'block';
            box.style.borderColor = 'var(--red)';
            box.innerHTML = "<strong>MANTENIMIENTO CORRECTIVO:</strong> El equipo ya falló o presenta errores. Se requiere reparación inmediata para restaurar el servicio.";
        } else {
            box.style.display = 'none';
        }
    }

    document.getElementById('reportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "TRANSMITIENDO DATOS...";

        const payload = {
            action: "addTicket",
            colaborador: document.getElementById('colaborador').value,
            categoria: document.getElementById('categoria').value,
            tipo: document.getElementById('tipoIntervencion').value,
            descripcion: document.getElementById('descripcion').value,
            prioridad: document.getElementById('prioridad').value
        };

        try {
            // Enviamos los datos al Excel
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            document.getElementById('success').style.display = 'block';
            document.getElementById('reportForm').reset();
            document.getElementById('explicacion').style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('success').style.display = 'none';
                btn.disabled = false;
                btn.innerText = "ENVIAR OTRO REPORTE";
            }, 3000);

        } catch (error) {
            alert("Error de conexión con el servidor IT.");
            btn.disabled = false;
            btn.innerText = "REINTENTAR ENVÍO";
        }
    });
</script>

</body>
</html>
