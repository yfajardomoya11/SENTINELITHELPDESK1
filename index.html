<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT HELP DESK — Terminal de Soporte</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg-primary: #030508; --bg-card: #0a0e17; --bg-input: #05070a; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3; 
    --accent-red: #ff3d6b; --accent-amber: #ffb300; --text-primary: #f0f5ff; 
    --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.1); 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, 0.02) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }

  .container { width: 100%; max-width: 550px; z-index: 1; }
  .form-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 40px; border-radius: 8px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 4px solid var(--accent-blue); }
  
  .header { text-align: center; margin-bottom: 30px; }
  .header h1 { font-family: 'Orbitron'; font-size: 1.8rem; letter-spacing: 4px; color: white; text-transform: uppercase; }
  .header h1 span { color: var(--accent-blue); }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 10px; font-family: 'Orbitron'; color: var(--accent-blue); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
  
  .form-select, .form-textarea { 
    width: 100%; background: var(--bg-input); border: 1px solid var(--border-subtle); 
    padding: 12px; color: white; font-family: 'Rajdhani'; font-size: 15px; outline: none; border-radius: 4px;
    transition: 0.3s;
  }
  .form-select:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }

  /* EXPLICACIÓN DINÁMICA */
  .info-box { 
    margin-top: 10px; padding: 12px; border-radius: 4px; font-size: 11px; 
    font-family: 'Share Tech Mono'; display: none; line-height: 1.5;
    animation: slideDown 0.3s ease;
  }
  .info-prev { background: rgba(0, 255, 163, 0.05); border: 1px solid var(--accent-green); color: var(--accent-green); }
  .info-corr { background: rgba(255, 179, 0, 0.05); border: 1px solid var(--accent-amber); color: var(--accent-amber); }
  
  @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  /* SELECTOR DE URGENCIA */
  .priority-container { background: #05070a; border: 1px solid var(--border-subtle); padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: center; }
  .priority-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #1a1d2d; outline: none; border-radius: 10px; margin: 15px 0; }
  .priority-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: #fff; cursor: pointer; border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

  .priority-labels { display: flex; justify-content: space-between; padding: 0 5px; }
  .p-label { font-family: 'Share Tech Mono'; font-size: 10px; color: var(--text-secondary); transition: 0.3s; }
  .state-low { color: var(--accent-green) !important; }
  .state-mid { color: var(--accent-cyan) !important; }
  .state-high { color: var(--accent-red) !important; text-shadow: 0 0 10px var(--accent-red); }

  /* BOTÓN SIMPLIFICADO */
  .btn-submit { 
    width: 100%; padding: 20px; background: var(--accent-blue); border: none; 
    color: white; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; 
    text-transform: uppercase; letter-spacing: 4px; border-radius: 4px; transition: 0.3s; 
  }
  .btn-submit:hover { background: #0056b3; box-shadow: 0 0 30px rgba(0, 123, 255, 0.4); transform: translateY(-2px); }
  .btn-submit:active { transform: translateY(0); }

  #successView { display: none; text-align: center; animation: fadeIn 0.5s ease; }
  .id-badge { background: #001a14; color: var(--accent-green); padding: 15px 30px; border-radius: 4px; font-family: 'Share Tech Mono'; font-size: 20px; border: 1px solid var(--accent-green); display: inline-block; margin: 20px 0; }
  
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="container">
  <div class="header"><h1>IT <span>HELP</span> DESK</h1></div>

  <div class="form-card">
    <div id="formView">
      <div class="form-group">
        <label class="form-label">👤 COLABORADOR</label>
        <select id="colaborador" class="form-select">
          <option value="">Identifíquese...</option>
          <option>Nikola Tesla</option>
          <option>Isaac Newton</option>
          <option>Sherlock Holmes</option>
          <option>Hulk</option>
          <option>Batman</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">⚙️ TIPO DE GESTIÓN</label>
        <select id="gestion" class="form-select" onchange="explainGestion()">
          <option value="">Seleccionar...</option>
          <option value="Preventivo">Mantenimiento Preventivo</option>
          <option value="Correctivo">Mantenimiento Correctivo</option>
        </select>
        <div id="infoPrev" class="info-box info-prev">🛡️ <strong>PREVENTIVO:</strong> Acción proactiva para evitar fallas técnicas.</div>
        <div id="infoCorr" class="info-box info-corr">🛠️ <strong>CORRECTIVO:</strong> Reparación inmediata de un fallo existente.</div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label class="form-label">🖥️ CATEGORÍA</label>
          <select id="dispositivo" class="form-select" onchange="loadFaults()">
            <option value="">Seleccionar...</option>
            <option value="Hardware">Hardware / Equipos</option>
            <option value="Redes">Redes / Conectividad</option>
            <option value="Software">Software / Apps</option>
            <option value="Accesos">Accesos / Seguridad</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">⚠️ FALLA ESPECÍFICA</label>
          <select id="falla" class="form-select" disabled><option value="">Esperando categoría...</option></select>
        </div>
      </div>

      <div class="priority-container">
        <label class="form-label">URGENCIA DEL REPORTE</label>
        <input type="range" min="1" max="3" value="2" class="priority-slider" id="pSlider" oninput="updatePriority()">
        <div class="priority-labels">
          <span class="p-label" id="lbl1">BAJA</span>
          <span class="p-label state-mid" id="lbl2">NORMAL</span>
          <span class="p-label" id="lbl3">ALTA</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">📝 NOTAS TÉCNICAS</label>
        <textarea id="descripcion" class="form-textarea" rows="2" placeholder="Describa brevemente el incidente..."></textarea>
      </div>

      <button class="btn-submit" id="btnSend" onclick="sendTicket()">ENVIAR REPORTE</button>
    </div>

    <div id="successView">
      <h2 style="font-family:'Orbitron'; color: var(--accent-green);">TICKET REGISTRADO</h2>
      <p style="margin-top:15px; color:var(--text-secondary);">El incidente ha sido enviado a la central de monitoreo.</p>
      <div class="id-badge" id="resId"></div>
      <button onclick="location.reload()" style="display:block; width:100%; background:none; border:1px solid var(--accent-blue); color:var(--accent-blue); padding:12px; cursor:pointer; font-family:'Orbitron';">NUEVO REPORTE</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  function explainGestion() {
    const v = document.getElementById('gestion').value;
    document.getElementById('infoPrev').style.display = (v === 'Preventivo') ? 'block' : 'none';
    document.getElementById('infoCorr').style.display = (v === 'Correctivo') ? 'block' : 'none';
  }

  function updatePriority() {
    const val = document.getElementById('pSlider').value;
    const labels = [document.getElementById('lbl1'), document.getElementById('lbl2'), document.getElementById('lbl3')];
    labels.forEach(l => l.className = 'p-label');
    if(val == 1) labels[0].classList.add('state-low');
    else if(val == 2) labels[1].classList.add('state-mid');
    else labels[2].classList.add('state-high');
  }

  // FALLAS PERSONALIZADAS SEGÚN CATEGORÍA
  const FAULTS = {
    'Hardware': ['Equipo no enciende', 'Daño físico visible', 'Ruidos / Sobrecalentamiento', 'Falla de periféricos'],
    'Redes': ['Sin conexión a Internet', 'Lentitud extrema en red', 'Falla de telefonía IP', 'Punto de red dañado'],
    'Software': ['Error en sistema operativo', 'Aplicación no abre', 'Problemas con Office / Correo', 'Error de impresión'],
    'Accesos': ['Contraseña bloqueada', 'Falla de VPN', 'Problemas con MFA / Token', 'Permisos de carpeta']
  };

  function loadFaults() {
    const d = document.getElementById('dispositivo').value;
    const f = document.getElementById('falla');
    f.innerHTML = '<option value="">Seleccione la falla...</option>';
    if (FAULTS[d]) {
      FAULTS[d].forEach(x => { let o = document.createElement('option'); o.value = o.textContent = x; f.appendChild(o); });
      f.disabled = false;
    } else { f.disabled = true; }
  }

  async function sendTicket() {
    const col = document.getElementById('colaborador').value;
    const ges = document.getElementById('gestion').value;
    const dev = document.getElementById('dispositivo').value;
    const fal = document.getElementById('falla').value;
    const prio = ["Baja", "Normal", "Alta"][document.getElementById('pSlider').value-1];

    if (!col || !ges || !dev || !fal) { alert("⚠️ Por favor, complete todos los campos."); return; }

    const btn = document.getElementById('btnSend');
    btn.disabled = true; btn.textContent = "PROCESANDO...";

    const tId = "TK-" + Math.random().toString(36).substr(2, 6).toUpperCase();

    try {
      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({
          action: "add", id: tId, colaborador: col, gestion: ges,
          dispositivo: dev, falla: fal, descripcion: document.getElementById('descripcion').value,
          fechaDisplay: new Date().toLocaleString(), estado: "Pendiente", prioridad: prio
        })
      });
      document.getElementById('formView').style.display = 'none';
      document.getElementById('resId').textContent = tId;
      document.getElementById('successView').style.display = 'block';
    } catch (e) { alert("Error de red"); btn.disabled = false; }
  }
</script>
</body>
</html>
