<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT HELP DESK — Terminal de Soporte</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg-primary: #030508; --bg-card: #0a0e17; --bg-input: #05070a; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3; 
    --accent-red: #ff3d6b; --accent-amber: #ffb300; --text-primary: #f0f5ff; 
    --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.1); 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, 0.02) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }

  .container { width: 100%; max-width: 550px; z-index: 1; }
  .form-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 40px; border-radius: 8px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 4px solid var(--accent-blue); }
  
  .header { text-align: center; margin-bottom: 30px; }
  .header h1 { font-family: 'Orbitron'; font-size: 1.8rem; letter-spacing: 4px; color: white; text-transform: uppercase; }
  .header h1 span { color: var(--accent-blue); }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 10px; font-family: 'Orbitron'; color: var(--accent-blue); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
  
  .form-select, .form-textarea { 
    width: 100%; background: var(--bg-input); border: 1px solid var(--border-subtle); 
    padding: 12px; color: white; font-family: 'Rajdhani'; font-size: 15px; outline: none; border-radius: 4px;
    transition: 0.3s;
  }

  .btn-submit { 
    width: 100%; padding: 20px; background: var(--accent-blue); border: none; 
    color: white; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; 
    text-transform: uppercase; letter-spacing: 4px; border-radius: 4px; transition: 0.3s; 
  }
  .btn-submit:hover { background: #0056b3; box-shadow: 0 0 30px rgba(0, 123, 255, 0.4); }

  /* VISTA DE ÉXITO */
  #successView { display: none; text-align: center; animation: fadeIn 0.6s ease forwards; }
  .success-icon { font-size: 50px; color: var(--accent-green); margin-bottom: 20px; }
  .id-badge { background: #001a14; color: var(--accent-green); padding: 15px 30px; border-radius: 4px; font-family: 'Share Tech Mono'; font-size: 22px; border: 1px solid var(--accent-green); display: inline-block; margin: 20px 0; }
  .success-msg { font-size: 16px; line-height: 1.6; color: var(--text-secondary); margin-bottom: 30px; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
  <div class="header"><h1>IT <span>HELP</span> DESK</h1></div>

  <div class="form-card">
    <div id="formView">
      <div class="form-group">
        <label class="form-label">👤 COLABORADOR</label>
        <select id="colaborador" class="form-select">
          <option value="">Identifíquese...</option>
          <option>Nikola Tesla</option>
          <option>Isaac Newton</option>
          <option>Sherlock Holmes</option>
          <option>Hulk</option>
          <option>Batman</option>
        </select>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label class="form-label">🖥️ DISPOSITIVO</label>
          <select id="dispositivo" class="form-select" onchange="loadFaults()">
            <option value="">Seleccionar...</option>
            <option>PC Escritorio</option>
            <option>Laptop</option>
            <option>Impresora</option>
            <option>Router / Switch</option>
            <option>Teléfono IP</option>
            <option>CCTV / Cámaras</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">⚠️ FALLA ESPECÍFICA</label>
          <select id="falla" class="form-select" disabled><option value="">Esperando...</option></select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">⚙️ TIPO DE GESTIÓN</label>
        <select id="gestion" class="form-select">
          <option value="">Seleccionar...</option>
          <option value="Preventivo">Mantenimiento Preventivo</option>
          <option value="Correctivo">Mantenimiento Correctivo</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">📝 NOTAS TÉCNICAS</label>
        <textarea id="descripcion" class="form-textarea" rows="2" placeholder="Detalles del problema..."></textarea>
      </div>

      <button class="btn-submit" id="btnSend" onclick="sendTicket()">ENVIAR REPORTE</button>
    </div>

    <div id="successView">
      <div class="success-icon">✔</div>
      <h2 style="font-family:'Orbitron'; color: white;">RECIBIDO</h2>
      <p class="success-msg">
        Gracias, <span id="userNameSuccess" style="color:var(--accent-cyan); font-weight:bold;"></span>.<br>
        Su reporte ha sido procesado con éxito.
      </p>
      <div class="id-badge" id="resId"></div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 25px;">
        El equipo de TI se pondrá en contacto con usted a la brevedad posible.
      </p>
      <button onclick="location.reload()" style="background:transparent; border:1px solid var(--accent-blue); color:var(--accent-blue); padding:10px 20px; cursor:pointer; font-family:'Orbitron'; border-radius:4px; font-size:11px;">NUEVO REPORTE</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  // FALLAS DETALLADAS POR DISPOSITIVO
  const FAULTS = {
    'PC Escritorio': ['No enciende', 'Pantalla Azul (BSOD)', 'Lento / Se pega', 'Falla de Disco Duro'],
    'Laptop': ['No carga batería', 'Teclado no responde', 'Pantalla quebrada', 'Sobrecalentamiento'],
    'Impresora': ['Atasco de papel', 'Mancha las hojas', 'Error de Tóner/Tinta', 'No detectada en red'],
    'Router / Switch': ['Sin acceso a Internet', 'Wi-Fi inestable', 'Puerto físico dañado', 'Caída de segmento'],
    'Teléfono IP': ['Sin tono de llamada', 'Pantalla apagada', 'Audio distorsionado', 'Error de registro'],
    'CCTV / Cámaras': ['Cámara fuera de línea', 'Imagen borrosa', 'Falla de grabación', 'Problema con NVR/DVR']
  };

  function loadFaults() {
    const d = document.getElementById('dispositivo').value;
    const f = document.getElementById('falla');
    f.innerHTML = '<option value="">Seleccione falla...</option>';
    if (FAULTS[d]) {
      FAULTS[d].forEach(x => { let o = document.createElement('option'); o.value = o.textContent = x; f.appendChild(o); });
      f.disabled = false;
    } else { f.disabled = true; }
  }

  async function sendTicket() {
    const col = document.getElementById('colaborador').value;
    const ges = document.getElementById('gestion').value;
    const dev = document.getElementById('dispositivo').value;
    const fal = document.getElementById('falla').value;

    if (!col || !ges || !dev || !fal) { alert("⚠️ Mae, rellene todos los campos."); return; }

    const btn = document.getElementById('btnSend');
    btn.disabled = true; btn.textContent = "ENVIANDO...";

    const tId = "TK-" + Math.random().toString(36).substr(2, 6).toUpperCase();

    try {
      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({
          action: "add", id: tId, colaborador: col, gestion: ges,
          dispositivo: dev, falla: fal, descripcion: document.getElementById('descripcion').value,
          fechaDisplay: new Date().toLocaleString(), estado: "Pendiente", prioridad: "Normal"
        })
      });
      document.getElementById('formView').style.display = 'none';
      document.getElementById('userNameSuccess').textContent = col;
      document.getElementById('resId').textContent = tId;
      document.getElementById('successView').style.display = 'block';
    } catch (e) { alert("Error de red"); btn.disabled = false; }
  }
</script>
</body>
</html>
