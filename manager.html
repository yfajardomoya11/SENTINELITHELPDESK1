<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — IT COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #020406; --bg-sidebar: rgba(6, 11, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); --sidebar-w: 300px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  
  /* FIX AUTOFILL: EVITA QUE SE PONGA BLANCO AL ESCRIBIR */
  input:-webkit-autofill,
  input:-webkit-autofill:hover, 
  input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--accent-cyan) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--bg-card) inset !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, 0.03) 1px, transparent 1px); background-size: 35px 35px; pointer-events: none; z-index: 0; }

  /* LOGIN */
  #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 8px; width: 420px; text-align: center; border-top: 4px solid var(--accent-blue); }
  .login-box h2 { font-family: 'Orbitron'; color: white; letter-spacing: 2px; margin-bottom: 10px; font-size: 20px; }
  .login-field { width: 100%; background: #050a14; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

  /* SIDEBAR PERSISTENTE */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(25px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; display: none; flex-direction: column; }
  .sidebar-header { padding: 45px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-cyan); font-size: 11px; letter-spacing: 3px; }
  
  .user-card { margin: 25px 20px; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .theme-fajardo { background: linear-gradient(135deg, rgba(157, 80, 187, 0.15), rgba(110, 72, 170, 0.1)); border-color: var(--accent-purple) !important; }
  .theme-chris { background: linear-gradient(135deg, rgba(0, 123, 255, 0.15), rgba(0, 229, 255, 0.1)); border-color: var(--accent-blue) !important; }

  .user-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; border: 2px solid #fff; }
  .avatar-fajardo { background: var(--accent-purple); box-shadow: 0 0 15px var(--accent-purple); }
  .avatar-chris { background: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); }

  .nav-item { padding: 18px 25px; color: var(--text-secondary); cursor: pointer; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 1px; transition: 0.3s; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(0, 229, 255, 0.05); color: #fff; }
  .nav-item.active { background: rgba(0, 229, 255, 0.1); border-left-color: var(--accent-cyan); color: var(--accent-cyan); }

  /* MAIN CONTENT */
  .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; width: calc(100% - var(--sidebar-w)); }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 8px; position: relative; overflow: hidden; }
  .kpi-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent-blue); }
  .kpi-label { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
  .kpi-val { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; color: #fff; display: block; margin-top: 10px; }

  .charts-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; height: 380px; border-radius: 12px; }
  .chart-box h4 { font-family: 'Orbitron'; font-size: 10px; color: var(--accent-cyan); margin-bottom: 20px; letter-spacing: 2px; }

  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Share Tech Mono'; font-size: 11px; }
  td { padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: var(--text-secondary); }
  
  .badge { padding: 4px 8px; border-radius: 4px; font-family: 'Orbitron'; font-size: 9px; font-weight: 900; border: 1px solid transparent; }
  .badge-alta { background: rgba(255, 61, 107, 0.1); color: var(--accent-red); border-color: var(--accent-red); }
  .badge-resuelto { background: rgba(0, 255, 163, 0.1); color: var(--accent-green); border-color: var(--accent-green); }

  #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(15px); }
  .modal-content { background:var(--bg-card); border:1px solid var(--accent-blue); padding:40px; width:500px; border-radius:12px; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2>IT HELP DESK <span>CONTROL</span></h2>
    <p style="font-family:'Share Tech Mono'; font-size:10px; color:var(--accent-blue); margin-bottom:30px;">AUTH REQUIRED FOR OPERATOR</p>
    <input type="text" id="lUser" placeholder="ID OPERADOR" class="login-field">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field">
    <button class="btn-login" onclick="attemptLogin()">AUTENTICAR SISTEMA</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">IT COMMAND CENTER v2.5</div>
  <div class="user-card" id="profileCard">
    <div class="user-avatar" id="userAvatar">--</div>
    <div class="user-info">
      <span class="name" id="displayUser" style="font-weight:700; font-size:13px; display:block;">---</span>
      <span class="rank" id="displayRank" style="font-size:8px; font-family:'Orbitron'; color:var(--text-secondary);">---</span>
    </div>
  </div>
  <nav>
    <div class="nav-item active" id="navMonitor" onclick="setView('monitor')">📊 MONITOR GENERAL</div>
    <div class="nav-item" id="navResolved" onclick="setView('resolved')">🎫 TICKETS RESUELTOS</div>
    <div class="nav-item" onclick="exportToCSV()" style="color:var(--accent-amber); margin-top:20px; border-top:1px solid var(--border-subtle)">📄 EXPORTAR AUDITORÍA</div>
  </nav>
  <button onclick="location.reload()" style="margin:20px; padding:12px; background:rgba(255,61,107,0.1); border:1px solid var(--accent-red); color:var(--accent-red); cursor:pointer; font-family:'Orbitron'; font-size:9px; border-radius:4px;">LOGOUT</button>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 id="viewTitle" style="font-family:'Orbitron'; font-size:22px; letter-spacing:5px;">MONITOR <span>GENERAL</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 25px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">RE-SYNC DATA</button>
  </header>
  
  <div class="kpi-row" id="kpiContainer"></div>

  <div class="charts-grid">
    <div class="chart-box"><h4 id="chartTitle1">DISTRIBUCIÓN</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4 id="chartTitle2">SALUD NODOS</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box"><h4 id="chartTitle3">PERFORMANCE</h4><canvas id="chart3"></canvas></div>
  </div>

  <div class="table-container">
    <table id="mainTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<div id="modalObs">
  <div class="modal-content">
    <h3 style="font-family:'Orbitron'; color:var(--accent-cyan); margin-bottom:15px; font-size:14px;">RESOLVER NODO: <span id="modalTicketId" style="color:var(--accent-amber)"></span></h3>
    <textarea id="textoObs" rows="5" placeholder="Documente la solución técnica..." style="width:100%; background:#050a14; border:1px solid var(--border-subtle); color:white; padding:20px; margin-bottom:25px; font-family:'Share Tech Mono'; outline:none; resize:none;"></textarea>
    <div style="display:flex; gap:15px;">
      <button onclick="cerrarModal()" style="flex:1; padding:15px; background:transparent; border:1px solid var(--text-secondary); color:white; font-family:'Orbitron'; cursor:pointer; border-radius:4px;">ABORTAR</button>
      <button onclick="enviarResolucion()" style="flex:2; padding:15px; background:var(--accent-green); border:none; color:#000; font-family:'Orbitron'; font-weight:bold; cursor:pointer; border-radius:4px;">EJECUTAR CIERRE</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  const USERS = {
    "admin": {
      pass: "Admin2026!", name: "Y. FAJARDO",
      rank: "DEVSECOPS DEVELOPER & CIBERSECURITY SPECIALIST",
      theme: "theme-fajardo", avatar: "avatar-fajardo", init: "YF"
    },
    "ADMIN_CHRIS": {
      pass: "CHRIS-IT2026!", name: "CHRIS MORALES",
      rank: "NETWORK AND TELECOMMUNICATIONS ENGINEER",
      theme: "theme-chris", avatar: "avatar-chris", init: "CM"
    }
  };

  let fullData = []; let charts = {}; let currentView = 'monitor'; let ticketIdResolviendo = "";

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const admin = USERS[u];

    if(admin && admin.pass === p) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainDashboard').style.display = 'block';
      
      document.getElementById('profileCard').className = "user-card " + admin.theme;
      document.getElementById('userAvatar').className = "user-avatar " + admin.avatar;
      document.getElementById('userAvatar').textContent = admin.init;
      document.getElementById('displayUser').textContent = admin.name;
      document.getElementById('displayRank').textContent = admin.rank;
      
      syncData();
    } else { alert("ACCESO DENEGADO"); }
  }

  async function syncData() { 
    try { 
      const r = await fetch(SCRIPT_URL); 
      fullData = await r.json(); 
      updateUI(); 
    } catch(e) { console.error("Error en Sync", e); } 
  }

  function setView(view) {
    currentView = view;
    document.getElementById('navMonitor').classList.toggle('active', view === 'monitor');
    document.getElementById('navResolved').classList.toggle('active', view === 'resolved');
    updateUI();
  }

  function updateUI() {
    const kpiBox = document.getElementById('kpiContainer');
    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const title = document.getElementById('viewTitle');

    if(currentView === 'monitor') {
      title.innerHTML = "MONITOR <span>GENERAL</span>";
      const pend = fullData.filter(t => t.estado === 'Pendiente');
      const alta = pend.filter(t => t.prioridad === 'Alta').length;

      kpiBox.innerHTML = `
        <div class="kpi-card" style="border-bottom-color:var(--accent-blue)"><span class="kpi-label">TICKETS ACTIVOS</span><span class="kpi-val">${pend.length}</span></div>
        <div class="kpi-card" style="border-bottom-color:var(--accent-amber)"><span class="kpi-label">URGENTES</span><span class="kpi-val">${pend.filter(t=>t.prioridad==='Normal').length}</span></div>
        <div class="kpi-card" style="border-bottom-color:var(--accent-red)"><span class="kpi-label">CRÍTICO</span><span class="kpi-val">${alta}</span></div>
        <div class="kpi-card" style="border-bottom-color:var(--accent-cyan)"><span class="kpi-label">SALUD RED</span><span class="kpi-val">100%</span></div>
      `;

      tableHead.innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>DISPOSITIVO</th><th>ESTADO</th><th>ACCIÓN</th></tr>`;
      tableBody.innerHTML = pend.map(t => `
        <tr>
          <td style="color:var(--accent-cyan); font-family:'Share Tech Mono'; font-weight:bold;">#${t.id}</td>
          <td><span class="badge ${t.prioridad === 'Alta' ? 'badge-alta' : ''}">${t.prioridad.toUpperCase()}</span></td>
          <td>${t.colaborador}</td>
          <td>${t.dispositivo}</td>
          <td style="color:var(--accent-amber)">PENDIENTE</td>
          <td><button onclick="abrirModal('${t.id}')" style="background:var(--accent-green); color:#000; border:none; padding:6px 12px; border-radius:4px; font-family:'Orbitron'; font-size:9px; font-weight:900; cursor:pointer;">RESOLVER</button></td>
        </tr>
      `).join('');
      renderMonitorCharts(pend);

    } else {
      title.innerHTML = "TICKETS <span>RESUELTOS</span>";
      const res = fullData.filter(t => t.estado === 'Resuelto');
      
      kpiBox.innerHTML = `
        <div class="kpi-card" style="border-bottom-color:var(--accent-green)"><span class="kpi-label">TOTAL RESUELTOS</span><span class="kpi-val">${res.length}</span></div>
        <div class="kpi-card" style="border-bottom-color:var(--accent-cyan)"><span class="kpi-label">TIEMPO MEDIO</span><span class="kpi-val">45m</span></div>
        <div class="kpi-card" style="border-bottom-color:var(--accent-blue)"><span class="kpi-label">EFICIENCIA TI</span><span class="kpi-val">98%</span></div>
        <div class="kpi-card" style="border-bottom-color:var(--accent-purple)"><span class="kpi-label">AUDITORÍA OK</span><span class="kpi-val">${res.length}</span></div>
      `;

      tableHead.innerHTML = `<tr><th>ID</th><th>TÉCNICO</th><th>SOLUCIÓN</th><th>FECHA CIERRE</th><th>ESTADO</th></tr>`;
      tableBody.innerHTML = res.map(t => `
        <tr>
          <td style="color:var(--accent-cyan); font-family:'Share Tech Mono'; font-weight:bold;">#${t.id}</td>
          <td>${t.colaborador}</td>
          <td style="font-family:'Share Tech Mono'; color:var(--text-primary); font-size:11px; max-width:250px; overflow:hidden; text-overflow:ellipsis;" title="${t.observaciones || '---'}">
            ${t.observaciones || 'S/D'}
          </td>
          <td style="font-size:10px;">${t['ticket resuelto'] || '---'}</td>
          <td><span class="badge badge-resuelto">CLOSED</span></td>
        </tr>
      `).join('');
      renderResolvedCharts(res);
    }
  }

  function renderMonitorCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();
    const dev = {}; data.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
    const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8b9bb4', font: { family: 'Rajdhani', size: 10 } } } } };
    charts.c1 = new Chart(ctx1, { type: 'polarArea', data: { labels: Object.keys(dev), datasets: [{ data: Object.values(dev), backgroundColor: ['rgba(0,123,255,0.6)', 'rgba(157,80,187,0.6)', 'rgba(0,255,163,0.6)', 'rgba(255,179,0,0.6)'] }] }, options: { ...common, scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } } } });
    charts.c2 = new Chart(ctx2, { type: 'bar', data: { labels: ['Alta', 'Normal'], datasets: [{ data: [data.filter(t=>t.prioridad==='Alta').length, data.filter(t=>t.prioridad!=='Alta').length], backgroundColor: ['#ff3d6b', '#007bff'] }] }, options: common });
    charts.c3 = new Chart(ctx3, { type: 'radar', data: { labels: ['Hardware', 'Software', 'Network', 'Security', 'Ops'], datasets: [{ label: 'Health', data: [80, 95, 75, 100, 90], borderColor: '#00ffa3', backgroundColor: 'rgba(0,255,163,0.1)', fill: true }] }, options: { ...common, scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, angleLines: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#8b9bb4' }, ticks: { display: false } } } } });
  }

  function renderResolvedCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();
    const gest = {}; data.forEach(t => gest[t.gestion] = (gest[t.gestion] || 0) + 1);
    const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8b9bb4', font: { family: 'Rajdhani', size: 10 } } } } };
    charts.c1 = new Chart(ctx1, { type: 'doughnut', data: { labels: Object.keys(gest), datasets: [{ data: Object.values(gest), backgroundColor: ['#00ffa3', '#00e5ff', '#007bff'], borderWidth: 0 }] }, options: { ...common, cutout: '80%' } });
    charts.c2 = new Chart(ctx2, { type: 'line', data: { labels: data.slice(-5).map(t => t.id), datasets: [{ label: 'Rendimiento', data: [5, 12, 8, 15, 10], borderColor: '#00ffa3', tension: 0.4 }] }, options: common });
    charts.c3 = new Chart(ctx3, { type: 'bar', data: { labels: ['Ene', 'Feb', 'Mar', 'Abr'], datasets: [{ label: 'Cierres', data: [45, 52, 48, 60], backgroundColor: '#00e5ff' }] }, options: common });
  }

  function abrirModal(id) { ticketIdResolviendo = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('modalObs').style.display = "flex"; }
  function cerrarModal() { document.getElementById('modalObs').style.display = "none"; }
  
  async function enviarResolucion() {
    const obs = document.getElementById('textoObs').value.trim();
    if(!obs) { alert("¡ERROR: DEBE DOCUMENTAR LA SOLUCIÓN!"); return; }
    const btn = document.querySelector('.modal-content button:last-child');
    btn.disabled = true; btn.textContent = "CONECTANDO...";
    try {
      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({ action: "updateStatus", id: ticketIdResolviendo, newStatus: "Resuelto", observations: obs })
      });
      cerrarModal();
      setTimeout(syncData, 1500);
    } catch(e) { alert("Error"); } finally { btn.disabled = false; btn.textContent = "EJECUTAR CIERRE"; }
  }

  function exportToCSV() {
    let csv = "ID,Colaborador,Gestion,Dispositivo,Estado,Prioridad,Solucion\n";
    fullData.forEach(t => { csv += `${t.id},${t.colaborador},${t.gestion},${t.dispositivo},${t.estado},${t.prioridad},"${(t.observaciones||'').replace(/"/g, '""')}"\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = 'SENTINEL_AUDIT.csv'; link.click();
  }
</script>
</body>
</html>
</script>
</body>
</html>
