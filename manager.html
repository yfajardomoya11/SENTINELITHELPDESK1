<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — IT COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #020406; --bg-sidebar: rgba(6, 11, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); --sidebar-w: 300px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  
  /* FONDO NEÓN */
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, 0.03) 1px, transparent 1px); background-size: 35px 35px; pointer-events: none; z-index: 0; }

  /* LOGIN BLINDADO */
  #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 8px; width: 420px; text-align: center; border-top: 4px solid var(--accent-blue); }
  .login-field { width: 100%; background: #050a14; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(25px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; display: none; flex-direction: column; }
  .user-card { margin: 25px 20px; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .theme-fajardo { background: linear-gradient(135deg, rgba(157, 80, 187, 0.1), rgba(110, 72, 170, 0.1)); border-color: var(--accent-purple) !important; }
  .user-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; border: 2px solid #fff; font-size: 18px; }

  .nav-item { padding: 18px 25px; color: var(--text-secondary); cursor: pointer; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 1px; transition: 0.3s; border-left: 3px solid transparent; }
  .nav-item:hover, .nav-item.active { background: rgba(0, 229, 255, 0.1); border-left-color: var(--accent-cyan); color: var(--accent-cyan); }

  /* MAIN CONTENT */
  .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; width: calc(100% - var(--sidebar-w)); }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 8px; position: relative; }
  .kpi-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent-blue); }
  .kpi-val { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; color: #fff; display: block; margin-top: 10px; }

  /* CHARTS */
  .charts-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; height: 380px; border-radius: 12px; }
  .chart-box h4 { font-family: 'Orbitron'; font-size: 10px; color: var(--accent-cyan); margin-bottom: 20px; letter-spacing: 2px; }

  /* TABLAS */
  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Share Tech Mono'; font-size: 11px; }
  td { padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="font-family:'Orbitron'; color:white; margin-bottom:30px;">IT HELP DESK <span>CONTROL</span></h2>
    <input type="text" id="lUser" placeholder="ID OPERADOR" class="login-field">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field">
    <button class="btn-login" onclick="attemptLogin()">INICIAR TERMINAL</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header" style="padding:40px; font-family:'Orbitron'; font-size:10px; color:var(--accent-cyan);">COMMAND CENTER v2.8</div>
  <div class="user-card theme-fajardo" id="profileCard">
    <div class="user-avatar" style="background:var(--accent-purple)" id="userAvatar">YF</div>
    <div class="user-info">
      <span class="name" id="displayUser" style="font-weight:700; font-size:13px; display:block;">---</span>
      <span class="rank" id="displayRank" style="font-size:8px; font-family:'Orbitron'; color:var(--text-secondary);">---</span>
    </div>
  </div>
  <nav>
    <div class="nav-item active" onclick="setView('monitor')">📊 MONITOR GENERAL</div>
    <div class="nav-item" onclick="setView('resolved')">🎫 TICKETS RESUELTOS</div>
  </nav>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 id="viewTitle" style="font-family:'Orbitron'; font-size:22px; letter-spacing:5px;">MONITOR <span>GENERAL</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 25px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">RE-SYNC DATA</button>
  </header>
  
  <div class="kpi-row" id="kpiContainer"></div>
  <div class="charts-grid">
    <div class="chart-box"><h4>RADAR DE INCIDENCIAS</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4>VOLUMEN OPERATIVO</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box"><h4>PERFORMANCE TI</h4><canvas id="chart3"></canvas></div>
  </div>
  <div class="table-container"><table id="mainTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
</main>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  const USERS = {
    "admin": { name: "YANANTH FAJARDO MOYA", rank: "DEVSECOPS SPECIALIST", pass: "Admin2026!", init: "YF" },
    "ADMIN_CHRIS": { name: "CHRIS MORALES", rank: "NETWORK ENGINEER", pass: "CHRIS-IT2026!", init: "CM" }
  };

  let fullData = []; let charts = {}; let currentView = 'monitor'; let currentUser = null;

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const admin = USERS[u];
    if(admin && admin.pass === p) {
      currentUser = admin;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainDashboard').style.display = 'block';
      document.getElementById('displayUser').textContent = admin.name;
      document.getElementById('displayRank').textContent = admin.rank;
      document.getElementById('userAvatar').textContent = admin.init;
      syncData();
    } else { alert("ERROR"); }
  }

  async function syncData() { try { const r=await fetch(SCRIPT_URL); fullData=await r.json(); updateUI(); } catch(e){ console.error(e); } }
  
  function setView(v) { currentView = v; updateUI(); }

  function updateUI() {
    const pend = fullData.filter(t => t.estado === 'Pendiente');
    const res = fullData.filter(t => t.estado === 'Resuelto');
    const box = document.getElementById('kpiContainer');
    const body = document.getElementById('tableBody');
    const head = document.getElementById('tableHead');
    
    if(currentView === 'monitor') {
      box.innerHTML = `<div class="kpi-card"><span class="kpi-label">EN LÍNEA</span><span class="kpi-val">${pend.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-red)"><span class="kpi-label">CRITICIDAD</span><span class="kpi-val">${pend.filter(x=>x.prioridad==='Alta').length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-amber)"><span class="kpi-label">PENDIENTES</span><span class="kpi-val">${pend.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-green)"><span class="kpi-label">RED</span><span class="kpi-val">UP</span></div>`;
      head.innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>DISPOSITIVO</th><th>ESTADO</th></tr>`;
      body.innerHTML = pend.map(t => `<tr><td style="color:var(--accent-cyan); font-weight:bold;">#${t.id}</td><td>${t.prioridad}</td><td>${t.colaborador}</td><td>${t.dispositivo}</td><td style="color:var(--accent-amber)">ACTIVO</td></tr>`).join('');
      renderCharts(pend);
    } else {
      box.innerHTML = `<div class="kpi-card" style="border-bottom-color:var(--accent-green)"><span class="kpi-label">TOTAL CIERRES</span><span class="kpi-val">${res.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-cyan)"><span class="kpi-label">EFICIENCIA</span><span class="kpi-val">98%</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-blue)"><span class="kpi-label">AUDIT</span><span class="kpi-val">${res.length}</span></div><div class="kpi-card" style="border-bottom-color:var(--accent-purple)"><span class="kpi-label">STATUS</span><span class="kpi-val">OK</span></div>`;
      head.innerHTML = `<tr><th>ID</th><th>TECNICO</th><th>SOLUCION</th><th>FECHA</th><th>ESTADO</th></tr>`;
      body.innerHTML = res.map(t => `<tr><td style="color:var(--accent-cyan); font-weight:bold;">#${t.id}</td><td>${t.colaborador}</td><td>${t.observaciones||'OK'}</td><td>${t['ticket resuelto']||'---'}</td><td style="color:var(--accent-green)">CLOSED</td></tr>`).join('');
      renderCharts(res);
    }
  }

  function renderCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();

    const dev = {}; data.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
    
    // CONFIGURACIÓN PARA QUITAR NÚMEROS Y CUADROS INTERNOS
    const cleanOpts = {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#8b9bb4' }, grid: { display: false } },
        x: { ticks: { color: '#8b9bb4' }, grid: { display: false } },
        r: { 
          angleLines: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { display: false }, // QUITA LOS NÚMEROS DEL CENTRO
          pointLabels: { color: '#8b9bb4', font: { size: 10 } }
        }
      },
      plugins: { legend: { labels: { color: '#8b9bb4', font: { family: 'Rajdhani' } } } }
    };

    charts.c1 = new Chart(ctx1, { type: 'radar', data: { labels: Object.keys(dev), datasets: [{ label: 'Fallas', data: Object.values(dev), borderColor: '#00e5ff', backgroundColor: 'rgba(0,229,255,0.2)', fill: true }] }, options: cleanOpts });
    charts.c2 = new Chart(ctx2, { type: 'bar', data: { labels: ['Alta', 'Normal'], datasets: [{ label: 'Prioridad', data: [data.filter(t=>t.prioridad==='Alta').length, data.filter(t=>t.prioridad!=='Alta').length], backgroundColor: ['#ff3d6b', '#007bff'] }] }, options: cleanOpts });
    charts.c3 = new Chart(ctx3, { type: 'polarArea', data: { labels: ['Net', 'Sec', 'HW', 'SW', 'Ops'], datasets: [{ data: [15, 25, 20, 30, 10], backgroundColor: ['#00ffa3', '#9d50bb', '#007bff', '#ffb300', '#ff3d6b'] }] }, options: { ...cleanOpts, scales: { r: { ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' } } } } });
  }
</script>
</body>
</html>
