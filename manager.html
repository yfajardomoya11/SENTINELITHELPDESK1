<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL IT CONTROL v6.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            --bg: #020406; --card: #0a0e17; --blue: #007bff; --cyan: #00e5ff; 
            --green: #00ffa3; --red: #ff3d6b; --text: #f0f5ff; --sidebar: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* LOGIN */
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); border: 1px solid var(--blue); padding: 40px; border-radius: 10px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #050a14; border: 1px solid var(--blue); color: white; border-radius: 5px; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar); background: #060b14; border-right: 1px solid rgba(0,229,255,0.1); display: none; flex-direction: column; }
        .nav-item { padding: 20px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; color: #8b9bb4; font-family: 'Orbitron'; font-size: 11px; }
        .nav-item.active { background: rgba(0,229,255,0.05); border-left-color: var(--cyan); color: var(--cyan); }

        /* CONTENT */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .view { display: none; }
        .view.active { display: block; }

        /* TABLAS PRO */
        .table-wrap { background: var(--card); border: 1px solid rgba(0,229,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,123,255,0.1); color: var(--cyan); padding: 15px; text-align: left; font-family: 'Orbitron'; font-size: 10px; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi { background: var(--card); padding: 20px; border-radius: 8px; border-bottom: 3px solid var(--blue); }
        .kpi h3 { font-size: 10px; color: var(--cyan); font-family: 'Orbitron'; }
        .kpi span { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }

        .btn { background: var(--blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 9px; }
        .btn:hover { background: var(--cyan); color: black; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 10px; width: 400px; border: 1px solid var(--cyan); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">SENTINEL IT</h2>
        <input type="text" id="user" placeholder="USUARIO">
        <input type="password" id="pass" placeholder="CONTRASEÑA">
        <button onclick="login()" class="btn" style="width:100%; padding:15px;">ACCEDER</button>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <div style="padding:30px; font-family:'Orbitron'; color:var(--cyan); border-bottom:1px solid rgba(255,255,255,0.1);">SISTEMA V6.5</div>
    <div class="nav-item active" onclick="setView('monitor', this)">MONITOR PENDIENTES</div>
    <div class="nav-item" onclick="setView('resueltos', this)">TICKETS RESUELTOS</div>
    <div class="nav-item" onclick="sync()" style="color:var(--green);">RE-SINCRONIZAR</div>
    <div class="nav-item" onclick="reporte()" style="color:var(--cyan);">DESCARGAR PDF</div>
</aside>

<main class="main" id="main">
    <div id="view-monitor" class="view active">
        <div class="kpi-row">
            <div class="kpi"><h3>PENDIENTES</h3><span id="k-pend">0</span></div>
            <div class="kpi" style="border-color:var(--red)"><h3>CRÍTICOS</h3><span id="k-crit" style="color:var(--red)">0</span></div>
            <div class="kpi"><h3>SALUD RED</h3><span style="color:var(--green)">94%</span></div>
            <div class="kpi"><h3>TÉCNICO</h3><span id="userName" style="font-size:14px;">---</span></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>ID</th><th>PRIORIDAD</th><th>DISPOSITIVO</th><th>ESTADO</th><th>ACCIÓN</th></tr>
                </thead>
                <tbody id="body-pend"></tbody>
            </table>
        </div>
    </div>

    <div id="view-resueltos" class="view">
        <div class="kpi-row">
            <div class="kpi" style="border-color:var(--green)"><h3>COMPLETADOS</h3><span id="k-res">0</span></div>
            <div class="kpi"><h3>SLA</h3><span>100%</span></div>
            <div class="kpi"><h3>MODO</h3><span>AUDITORÍA</span></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>ID</th><th>FECHA CIERRE</th><th>TÉCNICO</th><th>OBSERVACIÓN FINAL</th></tr>
                </thead>
                <tbody id="body-res"></tbody>
            </table>
        </div>
    </div>
</main>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; font-family:'Orbitron';">RESOLVER TICKET #<span id="mId"></span></h3>
        <textarea id="mObs" style="width:100%; height:100px; background:#050a14; color:white; border:1px solid var(--blue); padding:10px; margin-bottom:15px;" placeholder="¿Qué se arregló?"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="cerrarM()" style="flex:1; background:gray; border:none; color:white; cursor:pointer;">CANCELAR</button>
            <button onclick="enviar()" style="flex:2;" class="btn">CERRAR TICKET</button>
        </div>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
    let data = [];
    let tid = null;

    function login() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if((u==='admin' && p==='Admin2026!') || (u==='chris' && p==='Admin123!')) {
            document.getElementById('loginOverlay').style.display='none';
            document.getElementById('sidebar').style.display='flex';
            document.getElementById('main').style.display='block';
            document.getElementById('userName').innerText = u.toUpperCase();
            sync();
        } else { alert('Acceso denegado'); }
    }

    function setView(v, el) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        el.classList.add('active');
    }

    async function sync() {
        const res = await fetch(URL);
        data = await res.json();
        render();
    }

    function render() {
        const pBody = document.getElementById('body-pend');
        const rBody = document.getElementById('body-res');
        pBody.innerHTML = ''; rBody.innerHTML = '';
        
        let pCount = 0; let rCount = 0; let cCount = 0;

        data.forEach(t => {
            const estado = (t.Estado || t.estado || "").toLowerCase();
            const prioridad = t.Prioridad || t.prioridad || "Media";
            const id = t.ID || t.id || "000";

            if(estado === 'pendiente') {
                pCount++;
                if(prioridad.toLowerCase() === 'alta') cCount++;
                pBody.innerHTML += `<tr>
                    <td>#${id}</td>
                    <td style="color:${prioridad==='Alta'?'#ff3d6b':'#f0f5ff'}">${prioridad}</td>
                    <td>${t.Equipo || t.dispositivo || 'N/A'}</td>
                    <td><span style="color:orange">PENDIENTE</span></td>
                    <td><button class="btn" onclick="abrirM('${id}')">LOG</button></td>
                </tr>`;
            } else if(estado === 'resuelto') {
                rCount++;
                rBody.innerHTML += `<tr>
                    <td style="color:var(--cyan)">#${id}</td>
                    <td>${t['Ticket Resuelto'] || t['fecha'] || 'Hoy'}</td>
                    <td>${t.Técnico || t.colaborador || 'Chris'}</td>
                    <td style="font-family:'Share Tech Mono'; color:var(--green)">${t.Observaciones || t.observaciones || 'Sin datos'}</td>
                </tr>`;
            }
        });

        document.getElementById('k-pend').innerText = pCount;
        document.getElementById('k-res').innerText = rCount;
        document.getElementById('k-crit').innerText = cCount;
    }

    function abrirM(id) { tid = id; document.getElementById('mId').innerText = id; document.getElementById('modal').style.display='flex'; }
    function cerrarM() { document.getElementById('modal').style.display='none'; }

    async function enviar() {
        const obs = document.getElementById('mObs').value;
        if(!obs) return alert('Ponga la observación');
        cerrarM();
        await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:'updateStatus', id:tid, observations:obs}) });
        setTimeout(sync, 1500);
    }

    function reporte() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("REPORTE DE AUDITORÍA TI - SENTINEL", 10, 20);
        doc.setFontSize(12);
        doc.text("Resumen de gestión de infraestructura.", 10, 30);
        doc.text("Tickets Resueltos: " + document.getElementById('k-res').innerText, 10, 45);
        doc.text("Tickets Pendientes: " + document.getElementById('k-pend').innerText, 10, 55);
        doc.save("Reporte_TI.pdf");
    }
</script>
</body>
</html>
