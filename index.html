<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI HELP DESK | Soporte Técnico</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #020406; --card: #0a0e17; --blue: #007bff; --cyan: #00e5ff;
            --green: #00ffa3; --text: #f0f5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            background: var(--card); border: 1px solid rgba(0, 123, 255, 0.2);
            padding: 40px; border-radius: 15px; width: 100%; max-width: 600px;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.1); border-top: 4px solid var(--blue);
        }
        .header-area { text-align: center; margin-bottom: 35px; }
        .header-area h1 { font-family: 'Orbitron'; color: var(--cyan); letter-spacing: 3px; font-size: 26px; }
        .header-area p { font-family: 'Orbitron'; font-size: 10px; color: #8b9bb4; letter-spacing: 2px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-family: 'Orbitron'; font-size: 10px; color: var(--blue); letter-spacing: 1px; }
        
        select, input, textarea {
            width: 100%; background: #050a14; border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 14px; color: white; border-radius: 6px; outline: none; font-family: 'Rajdhani'; font-size: 16px;
        }
        select:focus, input:focus, textarea:focus { border-color: var(--cyan); }

        .btn-submit {
            width: 100%; background: var(--blue); color: white; border: none;
            padding: 18px; border-radius: 6px; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; transition: 0.3s; letter-spacing: 2px; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }
        
        /* Pantalla de Recibido */
        #successView { display: none; text-align: center; animation: fadeIn 0.4s ease; }
        .check-icon { font-size: 70px; color: var(--blue); margin-bottom: 20px; }
        .ticket-box { font-family: 'Orbitron'; font-size: 28px; color: var(--green); margin: 20px 0; display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="form-container" id="formView">
    <div class="header-area">
        <h1>TI HELP DESK</h1>
        <p>SOPORTE TÉCNICO</p>
    </div>

    <form id="reportForm">
        <div class="input-group">
            <label>NOMBRE DEL COLABORADOR</label>
            <select id="nombre" required>
                <option value="">Seleccione su nombre...</option>
                <option value="Vegeta">Vegeta</option>
                <option value="Van Flyheight">Van Flyheight</option>
                <option value="Tony Stark">Tony Stark</option>
                <option value="Neo">Neo</option>
                <option value="Chris Morales">Chris Morales</option>
            </select>
        </div>

        <div class="input-group">
            <label>TIPO DE DISPOSITIVO</label>
            <select id="dispositivo" onchange="cargarFallas()" required>
                <option value="">Seleccione Dispositivo...</option>
                <option value="Computadora">Computadora (PC / Laptop)</option>
                <option value="Red">Equipo de Red (Router / Switch)</option>
                <option value="Impresora">Impresora / Periférico</option>
                <option value="Telefono">Teléfono IP / Móvil</option>
            </select>
        </div>

        <div class="input-group">
            <label>FALLA DETECTADA</label>
            <select id="falla" required disabled>
                <option value="">Primero seleccione un dispositivo...</option>
            </select>
        </div>

        <div class="input-group">
            <label>GESTIÓN SOLICITADA</label>
            <select id="gestion" required>
                <option value="Correctivo">Mantenimiento Correctivo (Reparación)</option>
                <option value="Preventivo">Mantenimiento Preventivo (Revisión)</option>
            </select>
        </div>

        <div class="input-group">
            <label>OBSERVACIONES (OPCIONAL)</label>
            <textarea id="obs" rows="3" placeholder="Detalles adicionales..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">ENVIAR REPORTE</button>
    </form>
</div>

<div class="form-container" id="successView">
    <i class="fa-solid fa-circle-check check-icon"></i>
    <h2 style="font-family: 'Orbitron'; color: white;">¡RECIBIDO!</h2>
    <p style="margin-top: 15px; color: #8b9bb4;">Muchas gracias, <span id="userName" style="color: var(--cyan);"></span>.</p>
    <p style="margin-top: 10px; font-size: 12px;">TU NÚMERO DE TICKET ES:</p>
    <span class="ticket-box" id="ticketNum">#0000</span>
    <p style="color: var(--cyan); font-weight: bold; margin-top: 20px; letter-spacing: 1px;">PRONTO SERÁ CONTACTADO POR TI.</p>
    <button onclick="location.reload()" class="btn-submit" style="background: #1a2433; margin-top: 30px;">ACEPTAR</button>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";

    const fallasPorDispositivo = {
        "Computadora": ["No enciende", "Pantallazo Azul", "Lenta / Se pega", "Error de Software"],
        "Red": ["Sin Internet", "Wi-Fi no conecta", "Cable dañado", "VPN no funciona"],
        "Impresora": ["Atasco de papel", "No imprime", "Sin tinta / tóner", "Error de red"],
        "Telefono": ["Sin tono", "Pantalla quebrada", "No carga", "App no abre"]
    };

    function cargarFallas() {
        const disp = document.getElementById('dispositivo').value;
        const fallaSelect = document.getElementById('falla');
        fallaSelect.innerHTML = '<option value="">Seleccione la falla...</option>';
        
        if (disp) {
            fallaSelect.disabled = false;
            fallasPorDispositivo[disp].forEach(f => {
                let opt = document.createElement('option');
                opt.value = f;
                opt.innerText = f;
                fallaSelect.appendChild(opt);
            });
        } else {
            fallaSelect.disabled = true;
        }
    }

    document.getElementById('reportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const nombre = document.getElementById('nombre').value;
        const tNum = Math.floor(1000 + Math.random() * 9000);

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const payload = {
            action: "addTicket",
            colaborador: nombre,
            dispositivo: document.getElementById('dispositivo').value,
            falla: document.getElementById('falla').value,
            tipo: document.getElementById('gestion').value,
            observaciones: document.getElementById('obs').value
        };

        try {
            await fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            document.getElementById('formView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
            document.getElementById('userName').innerText = nombre;
            document.getElementById('ticketNum').innerText = "#" + tNum;
        } catch (err) {
            alert("Error al enviar. Intente de nuevo.");
            btn.disabled = false;
            btn.innerText = "REINTENTAR";
        }
    });
</script>

</body>
</html>
