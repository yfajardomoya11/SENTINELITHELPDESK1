<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — IT Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { 
    --bg-primary: #030508; --bg-sidebar: rgba(5, 10, 20, 0.98); --bg-card: #0a0e17; 
    --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
    --accent-purple: #9d50bb; --accent-indigo: #6e48aa;
    --accent-red: #ff3d6b; --accent-amber: #ffb300;
    --text-primary: #f0f5ff; --text-secondary: #8b9bb4; --border-subtle: rgba(0, 229, 255, 0.15); --sidebar-w: 280px; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 123, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.01) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }

  /* LOGIN CLÁSICO */
  #loginOverlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 4px; width: 400px; text-align: center; border-top: 4px solid var(--accent-blue); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
  .login-field { width: 100%; background: #0a1520; border: 1px solid var(--border-subtle); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; }
  .btn-login { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; transition: 0.3s; }
  .btn-login:hover { background: var(--accent-blue); color: white; box-shadow: 0 0 20px var(--accent-blue); }

  /* SIDEBAR MAESTRO */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); backdrop-filter: blur(20px); border-right: 1px solid var(--border-subtle); height: 100vh; position: fixed; left: 0; top: 0; transition: 0.5s; z-index: 1000; display: flex; flex-direction: column; }
  .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); font-family: 'Orbitron'; color: var(--accent-blue); font-size: 11px; letter-spacing: 2px; }
  
  /* PERFILES DINÁMICOS */
  .user-card { margin: 20px; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .user-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; font-family: 'Orbitron'; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
  
  /* Tema Fajardo (Morado/DevSecOps) */
  .theme-fajardo { background: linear-gradient(135deg, rgba(110, 72, 170, 0.15), rgba(157, 80, 187, 0.15)); border-color: rgba(157, 80, 187, 0.4) !important; }
  .avatar-fajardo { background: linear-gradient(45deg, var(--accent-indigo), var(--accent-purple)); border: 2px solid var(--accent-purple); color: white; text-shadow: 0 0 10px var(--accent-purple); }
  
  /* Tema Chris (Azul/Network) */
  .theme-chris { background: linear-gradient(135deg, rgba(0, 123, 255, 0.15), rgba(0, 229, 255, 0.15)); border-color: rgba(0, 229, 255, 0.4) !important; }
  .avatar-chris { background: linear-gradient(45deg, #0056b3, #00e5ff); border: 2px solid #00e5ff; color: white; text-shadow: 0 0 10px #00e5ff; }

  .user-info .name { font-weight: 700; font-size: 14px; color: white; display: block; font-family: 'Rajdhani'; letter-spacing: 0.5px; }
  .user-info .rank { font-size: 8px; font-family: 'Orbitron'; font-weight: 900; color: var(--text-secondary); line-height: 1.3; display: block; margin-top: 4px; }
  .online-tag { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono'; font-size: 9px; color: var(--accent-green); margin-top: 8px; }
  .dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* DASHBOARD ESTRUCTURA */
  .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-top: 3px solid var(--accent-blue); }
  .kpi-val { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; display: block; }

  .charts-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .chart-box { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 20px; height: 380px; border-radius: 12px; }
  .chart-box h4 { font-family: 'Orbitron'; font-size: 10px; color: var(--accent-blue); margin-bottom: 15px; letter-spacing: 2px; }

  /* TABLA */
  .table-container { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); font-family: 'Share Tech Mono'; color: var(--accent-blue); text-transform: uppercase; font-size: 11px; }
  td { padding: 14px 18px; border-bottom: 1px solid #141824; color: var(--text-secondary); }
  
  /* MODAL RESOLUCIÓN */
  #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
  .modal-content { background:var(--bg-card); border:1px solid var(--accent-blue); padding:35px; width:480px; border-radius:8px; border-top:4px solid var(--accent-blue); }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box" onkeydown="if(event.key==='Enter') attemptLogin()">
    <h2 style="font-family:'Orbitron'; color:white;">SENTINEL <span>SYS</span></h2>
    <p style="font-family:'Share Tech Mono'; font-size:10px; color:var(--accent-blue); margin-bottom:25px;">SECURE ACCESS REQUIRED</p>
    <input type="text" id="lUser" placeholder="ADMIN ID" class="login-field" autocomplete="off">
    <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field" autocomplete="off">
    <button class="btn-login" onclick="attemptLogin()">AUTENTICAR SISTEMA</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">IT COMMAND CENTER</div>
  <div class="user-card" id="profileCard">
    <div class="user-avatar" id="userAvatar">--</div>
    <div class="user-info">
      <span class="name" id="displayUser">---</span>
      <span class="rank" id="displayRank">---</span>
      <div class="online-tag"><div class="dot"></div> session active</div>
    </div>
  </div>
  <nav style="flex:1; padding:10px;">
    <div class="nav-item active" onclick="setView('Todos')">📊 MONITOR GLOBAL</div>
    <div class="nav-item" onclick="setView('Resuelto')">🎫 TICKETS RESUELTOS</div>
    <div class="nav-item" onclick="exportToCSV()" style="color:var(--accent-amber); border-top: 1px solid var(--border-subtle); margin-top: 20px;">📄 EXPORTAR LOGS CSV</div>
  </nav>
  <button onclick="location.reload()" style="margin:20px; padding:12px; background:transparent; border:1px solid var(--accent-red); color:var(--accent-red); cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">🔒 TERMINAR SESIÓN</button>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
    <h1 style="font-family:'Orbitron'; letter-spacing:5px;">SYSTEM <span>MONITOR</span></h1>
    <button onclick="syncData()" style="background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 25px; cursor:pointer; font-family:'Orbitron'; font-size:10px; border-radius:4px;">RE-SYNC TELEMETRY</button>
  </header>
  
  <div class="kpi-row" id="kpiRow"></div>

  <div class="charts-grid">
    <div class="chart-box"><h4>DEVICE RANKING</h4><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h4>GESTIÓN LOGS</h4><canvas id="chart2"></canvas></div>
    <div class="chart-box"><h4>SYSTEM EFFICIENCY</h4><canvas id="chart3"></canvas></div>
  </div>

  <div class="table-container">
    <table id="mainTable">
      <thead><tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>DISPOSITIVO</th><th>ESTADO</th><th>ACCIÓN</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<div id="modalObs">
  <div class="modal-content">
    <h3 style="font-family:'Orbitron'; color:var(--accent-blue); margin-bottom:15px; font-size:14px;">RESOLVER TICKET: <span id="modalTicketId" style="color:var(--accent-amber)"></span></h3>
    <textarea id="textoObs" rows="4" placeholder="Documente la solución técnica..." style="width:100%; background:#05070a; border:1px solid var(--border-subtle); color:white; padding:15px; font-family:'Share Tech Mono'; outline:none; resize:none; margin-bottom:25px; border-radius:4px;"></textarea>
    <div style="display:flex; gap:12px;">
      <button onclick="cerrarModal()" style="flex:1; padding:12px; background:transparent; border:1px solid var(--text-secondary); color:var(--text-secondary); cursor:pointer; font-family:'Orbitron'; font-size:10px;">CANCELAR</button>
      <button id="btnConfirmarObs" style="flex:2; padding:12px; background:linear-gradient(45deg, var(--accent-blue), var(--accent-cyan)); border:none; color:white; cursor:pointer; font-family:'Orbitron'; font-size:10px; font-weight:bold; border-radius:4px;">CONFIRMAR CIERRE</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
  
  const USERS = {
    "admin": {
      pass: "Admin2026!",
      name: "Y. FAJARDO",
      rank: "DEVSECOPS DEVELOPER & CIBERSECURITY SPECIALIST",
      theme: "theme-fajardo",
      avatar: "avatar-fajardo",
      init: "YF"
    },
    "ADMIN_CHRIS": {
      pass: "CHRIS-IT2026!",
      name: "CHRIS MORALES",
      rank: "NETWORK AND TELECOMMUNICATIONS ENGINEER",
      theme: "theme-chris",
      avatar: "avatar-chris",
      init: "CM"
    }
  };

  let fullData = []; let charts = {}; let currentView = 'Todos'; let ticketSeleccionado = "";

  function attemptLogin() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    const admin = USERS[u];

    if(admin && admin.pass === p) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainDashboard').style.display = 'block';
      
      document.getElementById('profileCard').className = "user-card " + admin.theme;
      document.getElementById('userAvatar').className = "user-avatar " + admin.avatar;
      document.getElementById('userAvatar').textContent = admin.init;
      document.getElementById('displayUser').textContent = admin.name;
      document.getElementById('displayRank').textContent = admin.rank;
      
      syncData();
    } else { alert("ACCESS DENIED"); }
  }

  async function syncData() { 
    try { 
      const r = await fetch(SCRIPT_URL); 
      fullData = await r.json(); 
      refreshUI(); 
    } catch(e) { console.error("Sync Failure"); } 
  }

  function setView(view) { currentView = view; refreshUI(); }

  function refreshUI() {
    const pend = fullData.filter(t => t.estado === "Pendiente");
    const res = fullData.filter(t => t.estado === "Resuelto");
    const viewData = currentView === 'Todos' ? fullData : res;

    document.getElementById('kpiRow').innerHTML = `
      <div class="kpi-card"><div style="font-size:10px; color:var(--accent-cyan)">TOTAL</div><div class="kpi-val">${fullData.length}</div></div>
      <div class="kpi-card" style="border-top-color:var(--accent-amber)"><div style="font-size:10px; color:var(--accent-amber)">PENDIENTES</div><div class="kpi-val">${pend.length}</div></div>
      <div class="kpi-card" style="border-top-color:var(--accent-green)"><div style="font-size:10px; color:var(--accent-green)">RESUELTOS</div><div class="kpi-val">${res.length}</div></div>
      <div class="kpi-card" style="border-top-color:var(--accent-red)"><div style="font-size:10px; color:var(--accent-red)">CRÍTICOS</div><div class="kpi-val">${pend.filter(t=>t.prioridad==="Alta").length}</div></div>
    `;

    document.getElementById('tableBody').innerHTML = viewData.map(t => `
      <tr>
        <td style="color:var(--accent-cyan); font-family:'Share Tech Mono'; font-weight:bold;">${t.id}</td>
        <td style="color:${t.prioridad==='Alta'?'var(--accent-red)':'var(--text-secondary)'}">${t.prioridad}</td>
        <td>${t.colaborador}</td>
        <td>${t.dispositivo}</td>
        <td style="color:${t.estado==='Resuelto'?'var(--accent-green)':'var(--accent-amber)'}">${t.estado}</td>
        <td>${t.estado==='Pendiente'?`<button onclick="abrirModal('${t.id}')" style="background:transparent; border:1px solid var(--accent-green); color:var(--accent-green); padding:5px 10px; cursor:pointer; font-family:'Share Tech Mono';">RESOLVER</button>`:'---'}</td>
      </tr>
    `).join('');
    renderCharts(viewData);
  }

  function renderCharts(data) {
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const ctx2 = document.getElementById('chart2').getContext('2d');
    const ctx3 = document.getElementById('chart3').getContext('2d');
    if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();
    
    const dev = {}; data.forEach(t => dev[t.dispositivo] = (dev[t.dispositivo] || 0) + 1);
    const common = { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8b9bb4', font: { family: 'Rajdhani', size: 10 } } } } };

    charts.c1 = new Chart(ctx1, { type: 'polarArea', data: { labels: Object.keys(dev), datasets: [{ data: Object.values(dev), backgroundColor: ['rgba(0,123,255,0.5)', 'rgba(157,80,187,0.5)', 'rgba(0,255,163,0.5)', 'rgba(255,179,0,0.5)'] }] }, options: { ...common, scales: { r: { grid: { color: '#1a1d2d' }, ticks: { display: false } } } } });
    charts.c2 = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Prev.', 'Corr.'], datasets: [{ data: [data.filter(t=>t.gestion==='Preventivo').length, data.filter(t=>t.gestion==='Correctivo').length], backgroundColor: ['#00e5ff', '#007bff'], borderWidth: 0 }] }, options: { ...common, cutout: '80%' } });
    const eff = fullData.length > 0 ? Math.round((fullData.filter(t=>t.estado==='Resuelto').length / fullData.length) * 100) : 0;
    charts.c3 = new Chart(ctx3, { type: 'doughnut', data: { datasets: [{ data: [eff, 100-eff], backgroundColor: ['#00ffa3', '#1a1d2d'], borderWidth: 0 }] }, options: { ...common, cutout: '85%' } });
  }

  function abrirModal(id) { ticketSeleccionado = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('textoObs').value = ""; document.getElementById('modalObs').style.display = "flex"; }
  function cerrarModal() { document.getElementById('modalObs').style.display = "none"; }
  
  async function enviarResolucion() {
    const obs = document.getElementById('textoObs').value.trim();
    if(!obs) { alert("ERROR: DOCUMENTATION REQUIRED"); return; }
    const btn = document.getElementById('btnConfirmarObs'); btn.disabled = true; btn.textContent = "UPLOADING...";
    try {
      await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updateStatus", id: ticketSeleccionado, newStatus: "Resuelto", observations: obs }) });
      cerrarModal(); setTimeout(syncData, 1500);
    } catch(e) { alert("NETWORK ERROR"); } finally { btn.disabled = false; btn.textContent = "CONFIRMAR CIERRE"; }
  }

  function exportToCSV() {
    let csv = "ID,Prioridad,Colaborador,Dispositivo,Estado\n";
    fullData.forEach(t => { csv += `${t.id},${t.prioridad},${t.colaborador},${t.dispositivo},${t.estado}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = 'SENTINEL_TELEMETRY.csv'; link.click();
  }
</script>
</body>
</html>
