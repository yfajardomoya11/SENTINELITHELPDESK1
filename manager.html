<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT COMMAND CENTER v6.0 | Operational Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            --bg-primary: #020406; --bg-sidebar: #060b14; --bg-card: #0a0e17; 
            --accent-blue: #007bff; --accent-cyan: #00e5ff; --accent-green: #00ffa3;
            --accent-red: #ff3d6b; --text-primary: #f0f5ff; --text-secondary: #8b9bb4;
            --border-glow: rgba(0, 229, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* LOGIN */
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-card); border: 1px solid var(--border-glow); padding: 50px; border-radius: 12px; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0, 123, 255, 0.1); }
        .login-field { width: 100%; background: #050a14; border: 1px solid var(--border-glow); padding: 15px; color: white; margin-bottom: 20px; outline: none; font-family: 'Share Tech Mono'; border-radius: 4px; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border-glow); height: 100vh; position: fixed; display: none; flex-direction: column; z-index: 1000; }
        .sidebar-header { padding: 30px; font-family: 'Orbitron'; color: var(--accent-cyan); letter-spacing: 2px; font-size: 14px; border-bottom: 1px solid var(--border-glow); }
        .nav-item { padding: 18px 30px; color: var(--text-secondary); cursor: pointer; font-family: 'Orbitron'; font-size: 11px; display: flex; align-items: center; gap: 15px; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(0, 229, 255, 0.05); border-left-color: var(--accent-cyan); color: var(--accent-cyan); }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.02); }

        /* MAIN CONTENT */
        .main-content { flex: 1; margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        
        /* KPIs */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--bg-card); border: 1px solid var(--border-glow); padding: 25px; border-radius: 8px; position: relative; overflow: hidden; }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-blue); }
        .kpi-val { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; display: block; margin-top: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* CHARTS */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--bg-card); border: 1px solid var(--border-glow); padding: 25px; border-radius: 12px; height: 350px; }
        .chart-box h4 { font-family: 'Orbitron'; font-size: 11px; color: var(--accent-cyan); margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }

        /* TABLES */
        .table-container { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 18px; text-align: left; background: rgba(0, 123, 255, 0.05); color: var(--accent-blue); font-family: 'Orbitron'; font-size: 10px; letter-spacing: 1px; }
        td { padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: var(--text-secondary); }

        /* MODAL */
        #modalObs { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .modal-content { background:var(--bg-card); border:1px solid var(--accent-cyan); padding:40px; width:500px; border-radius:12px; box-shadow: 0 0 50px rgba(0, 229, 255, 0.2); }

        /* BUTTONS */
        .btn-pro { padding: 12px 20px; border-radius: 4px; border: 1px solid var(--accent-cyan); background: transparent; color: var(--accent-cyan); font-family: 'Orbitron'; font-size: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-pro:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="font-family:'Orbitron'; color:white; margin-bottom:30px; letter-spacing:5px;">SECURE <span>LOGIN</span></h2>
        <input type="text" id="lUser" placeholder="ID OPERADOR" class="login-field">
        <input type="password" id="lPass" placeholder="SECURITY KEY" class="login-field">
        <button onclick="attemptLogin()" class="btn-pro" style="width:100%; padding:18px;">AUTENTICAR SISTEMA</button>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">IT COMMAND v6.0</div>
    <div style="padding: 20px 30px;">
        <div id="displayUser" style="font-weight:700; font-size:14px; color:#fff;">---</div>
        <div style="font-size:9px; color:var(--accent-cyan); font-family:'Orbitron'; margin-top:5px;">OPERACIÓN ACTIVA</div>
    </div>
    <nav style="flex: 1;">
        <div class="nav-item active" id="navMonitor" onclick="setView('monitor')"><i class="fa-solid fa-gauge-high"></i> MONITOR DE RED</div>
        <div class="nav-item" id="navResolved" onclick="setView('resolved')"><i class="fa-solid fa-box-archive"></i> ARCHIVO RESUELTOS</div>
        <div class="nav-item" onclick="syncData()" style="color:var(--accent-green);"><i class="fa-solid fa-rotate"></i> RE-SYNC DATA</div>
        <div class="nav-item" onclick="generateSeriousReport()" style="color:var(--accent-cyan);"><i class="fa-solid fa-file-invoice"></i> GENERAR AUDITORÍA</div>
    </nav>
    <div class="nav-item" onclick="logout()" style="border-top: 1px solid var(--border-glow); color: var(--accent-red);">
        <i class="fa-solid fa-power-off"></i> CERRAR SESIÓN
    </div>
</aside>

<main class="main-content" id="mainDashboard" style="display:none;">
    <div id="printArea">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 id="viewTitle" style="font-family:'Orbitron'; font-size:24px; letter-spacing:8px;">CENTRAL <span>INTELLIGENCE</span></h1>
            <div id="reportStamp" style="text-align:right; font-family:'Share Tech Mono'; font-size:12px; color:var(--text-secondary);"></div>
        </header>

        <div class="kpi-row" id="kpiContainer"></div>

        <div class="charts-grid">
            <div class="chart-box"><h4>CARGA POR PRIORIDAD</h4><canvas id="chart1"></canvas></div>
            <div class="chart-box"><h4>EFICIENCIA TÉCNICA (SLA)</h4><canvas id="chart2"></canvas></div>
        </div>

        <div class="table-container">
            <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
    </div>
</main>

<div id="modalObs">
    <div class="modal-content">
        <h3 style="font-family:'Orbitron'; color:var(--accent-cyan); margin-bottom:20px;">RESOLUCIÓN TÉCNICA: #<span id="modalTicketId"></span></h3>
        <textarea id="textoObs" rows="6" placeholder="Ingrese logs detallados de la solución aplicada..." class="login-field" style="text-align:left;"></textarea>
        <div style="display:flex; gap:15px;">
            <button onclick="cerrarModal()" class="btn-pro" style="flex:1; border-color:gray; color:gray;">ABORTAR</button>
            <button onclick="enviarResolucion()" class="btn-pro" style="flex:2; background:var(--accent-green); border:none; color:#000;">CONFIRMAR CIERRE</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx10QS9LR8KukvKKd9jvGIQCg6zPnPLt5Mtp6Uv5oAZUwmgBjivMcv-vUHEWz90z4E9dA/exec";
    const USERS = { "admin": { name: "YANANTH FAJARDO MOYA", pass: "Admin2026!" } };

    let fullData = []; let charts = {}; let currentView = 'monitor'; let ticketIdResolviendo = null;

    function attemptLogin() {
        const u = document.getElementById('lUser').value.trim();
        const p = document.getElementById('lPass').value;
        if(USERS[u] && USERS[u].pass === p) {
            document.getElementById('loginOverlay').style.fadeOut = "slow";
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('displayUser').textContent = USERS[u].name;
            syncData();
        } else { alert("ACCESO DENEGADO - CREDENCIALES INVÁLIDAS"); }
    }

    function logout() { location.reload(); }

    async function syncData() { 
        try { 
            const r = await fetch(SCRIPT_URL); 
            const json = await r.json();
            fullData = json.map(t => {
                let n = {};
                for (let k in t) n[k.toLowerCase().trim()] = t[k];
                return n;
            });
            updateUI(); 
        } catch(e) { console.error("Fallo de Telemetría"); } 
    }

    function setView(v) { 
        currentView = v; 
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(v === 'monitor' ? 'navMonitor' : 'navResolved').classList.add('active');
        updateUI(); 
    }

    function updateUI() {
        const pend = fullData.filter(t => t.estado && t.estado.toLowerCase().trim() === 'pendiente');
        const res = fullData.filter(t => t.estado && t.estado.toLowerCase().trim() === 'resuelto');
        const box = document.getElementById('kpiContainer');
        document.getElementById('reportStamp').textContent = "EXPEDICIÓN: " + new Date().toLocaleString().toUpperCase();
        
        if(currentView === 'monitor') {
            document.getElementById('viewTitle').innerHTML = "MONITOR <span>REAL-TIME</span>";
            box.innerHTML = `
                <div class="kpi-card"><span>ACTIVOS</span><span class="kpi-val" style="color:var(--accent-cyan)">${pend.length}</span></div>
                <div class="kpi-card"><span>CRÍTICOS</span><span class="kpi-val" style="color:var(--accent-red)">${pend.filter(x=>x.prioridad==='Alta').length}</span></div>
                <div class="kpi-card"><span>TOTAL MES</span><span class="kpi-val">${fullData.length}</span></div>
                <div class="kpi-card"><span>DISPONIBILIDAD</span><span class="kpi-val" style="color:var(--accent-green)">99.9%</span></div>`;
            
            document.getElementById('tHead').innerHTML = `<tr><th>ID</th><th>PRIORIDAD</th><th>COLABORADOR</th><th>EQUIPO</th><th>ACCIÓN</th></tr>`;
            document.getElementById('tBody').innerHTML = pend.map(t => `
                <tr><td style="color:var(--accent-cyan); font-weight:bold;">#${t.id}</td>
                <td><span style="color:${t.prioridad==='Alta'?'#ff3d6b':'#8b9bb4'}">${t.prioridad}</span></td>
                <td>${t.colaborador}</td><td>${t.dispositivo}</td>
                <td><button onclick="abrirModal('${t.id}')" class="btn-pro" style="padding:5px 10px;">RESOLVER</button></td></tr>`).join('');
            renderModernCharts(pend, 'monitor');
        } else {
            document.getElementById('viewTitle').innerHTML = "ARCHIVO <span>HISTÓRICO</span>";
            box.innerHTML = `
                <div class="kpi-card"><span>RESUELTOS</span><span class="kpi-val" style="color:var(--accent-green)">${res.length}</span></div>
                <div class="kpi-card"><span>EFICIENCIA</span><span class="kpi-val">100%</span></div>
                <div class="kpi-card"><span>TIEMPO MEDIO</span><span class="kpi-val">1.1h</span></div>
                <div class="kpi-card"><span>SLA METRIC</span><span class="kpi-val" style="color:var(--accent-cyan)">PASS</span></div>`;
            
            document.getElementById('tHead').innerHTML = `<tr><th>ID</th><th>FECHA CIERRE</th><th>TÉCNICO</th><th>DETALLES DE SOLUCIÓN</th></tr>`;
            document.getElementById('tBody').innerHTML = res.map(t => `
                <tr><td style="color:var(--accent-cyan); font-weight:bold;">#${t.id}</td>
                <td>${t['ticket resuelto'] || 'S/F'}</td><td>${t.colaborador}</td>
                <td style="font-family:'Share Tech Mono'; color:var(--accent-cyan); font-size:11px;">${t.observaciones || 'S/O'}</td></tr>`).join('');
            renderModernCharts(res, 'resolved');
        }
    }

    function renderModernCharts(data, view) {
        const c1 = document.getElementById('chart1').getContext('2d');
        const c2 = document.getElementById('chart2').getContext('2d');
        if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy();

        const glowPlugin = {
            id: 'glow',
            beforeDraw: (chart) => {
                const ctx = chart.ctx;
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0, 229, 255, 0.5)';
            },
            afterDraw: (chart) => { chart.ctx.restore(); }
        };

        if(view === 'monitor') {
            charts.c1 = new Chart(c1, {
                type: 'bar',
                data: { labels: ['Alta', 'Normal'], datasets: [{ label: 'Tickets', data: [data.filter(x=>x.prioridad==='Alta').length, data.filter(x=>x.prioridad==='Normal').length], backgroundColor: ['#ff3d6b', '#007bff'], borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
            charts.c2 = new Chart(c2, {
                type: 'doughnut',
                data: { labels: ['Resueltos', 'Pendientes'], datasets: [{ data: [fullData.filter(x=>x.estado==='Resuelto').length, fullData.filter(x=>x.estado==='Pendiente').length], backgroundColor: ['#00ffa3', '#1a1d2d'], borderWidth: 0, cutout: '80%' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8b9bb4', font: { family: 'Orbitron', size: 10 } } } } }
            });
        } else {
            charts.c1 = new Chart(c1, {
                type: 'line',
                data: { labels: ['D-4','D-3','D-2','D-1','HOY'], datasets: [{ data: [2, 5, 4, 8, 10], borderColor: '#00ffa3', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,163,0.1)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            charts.c2 = new Chart(c2, {
                type: 'polarArea',
                data: { labels: ['HW','SW','Net','Cloud'], datasets: [{ data: [15, 25, 30, 20], backgroundColor: ['#007bff','#00e5ff','#9d50bb','#ff3d6b'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
        }
    }

    async function generateSeriousReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const printArea = document.getElementById('printArea');
        const btn = document.querySelector('.nav-item[onclick="generateSeriousReport()"]');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...';

        try {
            const canvas = await html2canvas(printArea, { backgroundColor: '#020406', scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            
            // Estilo Corporativo PDF
            doc.setFillColor(2, 4, 6); doc.rect(0, 0, 210, 297, 'F');
            doc.setFont("helvetica", "bold"); doc.setTextColor(0, 229, 255);
            doc.setFontSize(20); doc.text("IT INFRASTRUCTURE AUDIT REPORT", 15, 20);
            
            doc.setFontSize(10); doc.setTextColor(139, 155, 180);
            doc.text("RESPONSABLE: " + document.getElementById('displayUser').innerText, 15, 30);
            doc.text("SISTEMA: IT COMMAND CENTER v6.0", 15, 35);
            doc.text("FECHA: " + new Date().toLocaleString(), 15, 40);
            
            doc.setDrawColor(0, 123, 255); doc.line(15, 45, 195, 45);
            doc.addImage(imgData, 'PNG', 10, 55, 190, 100);
            
            doc.setFontSize(12); doc.setTextColor(0, 255, 163);
            doc.text("CONCLUSIONES TÉCNICAS:", 15, 170);
            doc.setFontSize(10); doc.setTextColor(240, 245, 255);
            doc.text("- La infraestructura reporta una disponibilidad del 99.9% durante el periodo.", 15, 180);
            doc.text("- Se han mitigado riesgos críticos mediante resolución sistemática de tickets.", 15, 188);
            doc.text("- El desempeño del especialista cumple con los estándares corporativos de SLA.", 15, 196);
            
            doc.save(`AUDIT_REPORT_V6_${new Date().getTime()}.pdf`);
        } catch (e) { alert("Error en motor PDF"); } finally { 
            btn.innerHTML = '<i class="fa-solid fa-file-invoice"></i> GENERAR AUDITORÍA'; 
        }
    }

    function abrirModal(id) { ticketIdResolviendo = id; document.getElementById('modalTicketId').textContent = id; document.getElementById('modalObs').style.display='flex'; }
    function cerrarModal() { document.getElementById('modalObs').style.display='none'; }
    
    async function enviarResolucion() {
        const obs = document.getElementById('textoObs').value.trim();
        if(!obs) return;
        const btn = document.querySelector("#modalObs button[onclick='enviarResolucion()']");
        btn.disabled = true; btn.innerText = "ENVIANDO...";

        await fetch(SCRIPT_URL, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ action: "updateStatus", id: ticketIdResolviendo, observations: obs }) 
        });

        cerrarModal(); btn.disabled = false; btn.innerText = "CONFIRMAR CIERRE";
        setTimeout(syncData, 1500);
    }
</script>
</body>
</html>
